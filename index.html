<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>轻触 · 灵动音效计数器</title>
  <!-- 字体与图标 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center;
      padding:1.5rem; color:#f0f4ff; -webkit-font-smoothing:antialiased; transition:background 0.4s;
      position:relative; overflow-x:hidden;
    }
    body.theme-deep { background:radial-gradient(circle at 20% 30%, #2b3a55, #0f172a); }
    body.theme-sunset { background:linear-gradient(145deg, #3d2e3f, #1a1a2e); }
    body.theme-ocean { background:linear-gradient(145deg, #1a4a5f, #0a2330); }
    body.theme-forest { background:linear-gradient(145deg, #2b4a3a, #11231a); }
    body.theme-rose { background:radial-gradient(circle at 70% 20%, #5e3a4a, #1f1420); }

    /* 字幕层 ———— 永远在背景，穿透点击 */
    .subtitle-layer {
      position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:100; overflow:hidden;
    }
    .falling-subtitle {
      position:absolute; top:-50px; white-space:nowrap; font-size:clamp(1.2rem, 5vw, 2.2rem); font-weight:800;
      color:#fff9e6; text-shadow:0 0 15px #fb0, 0 0 30px #f80, 2px 4px 10px rgba(0,0,0,0.5);
      background:linear-gradient(145deg, #fff3bf, #ffda7a); -webkit-background-clip:text; background-clip:text;
      -webkit-text-stroke:1px rgba(0,0,0,0.2); letter-spacing:2px; opacity:1; transform:translateX(-50%);
      animation:dropAndFade 3.5s ease-out forwards; pointer-events:none; z-index:101; filter:drop-shadow(0 0 8px #ffb347);
    }
    @keyframes dropAndFade {
      0%{ top:-10%; opacity:1; transform:translateX(-50%) rotate(-3deg); }
      20%{ opacity:1; transform:translateX(-50%) rotate(1deg); }
      70%{ opacity:0.9; }
      100%{ top:100%; opacity:0; transform:translateX(-50%) rotate(5deg); }
    }

    /* 主卡片 */
    .counter-card {
      max-width:700px; width:100%; background:rgba(18,28,46,0.55); border-radius:4rem; padding:2.5rem 2.5rem 2rem;
      box-shadow:0 35px 60px -10px rgba(0,0,0,0.5), 0 0 0 1px rgba(120,200,255,0.15) inset;
      border:1px solid rgba(255,255,255,0.08); transition:box-shadow 0.3s, backdrop-filter 0.3s, background 0.3s;
      text-align:center; position:relative; z-index:10;
    }
    .counter-card.blur-enabled { backdrop-filter:blur(20px) saturate(200%); -webkit-backdrop-filter:blur(20px) saturate(200%); }
    .counter-card.blur-disabled { backdrop-filter:none; -webkit-backdrop-filter:none; background:rgba(20,30,45,0.7); }

    .top-buttons { position:absolute; top:24px; right:28px; display:flex; gap:10px; z-index:30; }
    .icon-btn {
      background:rgba(255,255,255,0.06); backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,0.1);
      border-radius:40px; width:48px; height:48px; display:flex; align-items:center; justify-content:center;
      cursor:pointer; color:#b8d6ff; font-size:1.5rem; transition:all 0.2s;
    }
    .icon-btn:hover { background:rgba(80,140,220,0.25); color:#fff; transform:scale(1.05); border-color:#6eb0ff; }
    .icon-btn.active { background:#2a5a9c; color:#fff; box-shadow:0 0 15px #3f9eff; }

    .settings-panel {
      position:absolute; top:80px; right:28px; width:300px; background:rgba(10,22,40,0.9);
      backdrop-filter:blur(25px); -webkit-backdrop-filter:blur(25px); border-radius:32px; padding:1.5rem 1.2rem;
      border:1px solid rgba(100,180,255,0.3); box-shadow:0 25px 35px -8px #00000080; z-index:40;
      opacity:0; visibility:hidden; transform:translateY(-10px); transition:0.25s; color:#e1eeff;
    }
    .settings-panel.show { opacity:1; visibility:visible; transform:translateY(0); }

    .panel-title { font-weight:600; margin-bottom:16px; display:flex; align-items:center; gap:8px; font-size:1.1rem; border-bottom:1px solid #3a5f8a; padding-bottom:10px; }
    .setting-item { margin-bottom:20px; }
    .setting-label { display:flex; align-items:center; gap:8px; font-size:0.9rem; margin-bottom:8px; opacity:0.9; }
    .toggle-switch { position:relative; display:inline-block; width:52px; height:28px; }
    .toggle-switch input { opacity:0; width:0; height:0; }
    .slider { position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background:#2a4058; transition:.3s; border-radius:34px; border:1px solid #6086b0; }
    .slider:before { position:absolute; content:""; height:22px; width:22px; left:3px; bottom:2px; background:#cde2ff; transition:.3s; border-radius:50%; }
    input:checked + .slider { background:#2a7faa; }
    input:checked + .slider:before { transform:translateX(24px); background:#fff; }

    select, .upload-btn, .text-input {
      width:100%; padding:10px 12px; background:#152b40; border:1px solid #3f6b94; border-radius:30px;
      color:#fff; font-size:0.9rem; outline:none; cursor:pointer; font-family:inherit; margin-top:5px;
    }
    .text-input { cursor:text; }
    .upload-btn { background:#1e3f5e; text-align:center; transition:0.15s; }
    #customAudioFile { display:none; }
    .sound-test-btn { background:transparent; border:1px dashed #6b9fd2; border-radius:30px; padding:6px 12px; color:#b4d6ff; margin-left:8px; cursor:pointer; }

    /* 计数区域 */
    .counter-header { display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:2rem; padding-right:80px; }
    .counter-header i { font-size:2.2rem; color:#7ad0ff; filter:drop-shadow(0 0 12px #3ea6ff); background:rgba(255,255,255,0.05); padding:12px; border-radius:50%; }
    h1 { font-weight:600; font-size:2.2rem; background:linear-gradient(135deg, #fff, #c6e2ff); -webkit-background-clip:text; background-clip:text; color:transparent; }

    #countValue { font-size:10rem; font-weight:800; line-height:1; background:linear-gradient(to bottom, #fff, #d6ecff); -webkit-background-clip:text; background-clip:text; color:transparent; text-shadow:0 10px 30px rgba(0,180,255,0.5); transition:0.15s; filter:drop-shadow(0 4px 6px #00000030); }
    .last-tap { font-size:1rem; color:#b0ceff; margin-bottom:2rem; display:flex; align-items:center; justify-content:center; gap:8px; background:rgba(10,25,45,0.4); padding:0.6rem 1.5rem; border-radius:60px; backdrop-filter:blur(8px); border:1px solid rgba(100,180,255,0.2); width:fit-content; margin-left:auto; margin-right:auto; }

    .button-group { display:flex; align-items:center; justify-content:center; gap:20px; flex-wrap:wrap; }
    .btn {
      border:none; background:rgba(20,40,70,0.55); backdrop-filter:blur(12px); padding:1.2rem 2.4rem; border-radius:60px;
      font-size:1.5rem; font-weight:600; color:#ecf5ff; display:inline-flex; align-items:center; gap:12px; cursor:pointer;
      box-shadow:0 12px 20px -10px rgba(0,0,0,0.4), 0 2px 0 0 rgba(255,255,255,0.1) inset;
      border:1px solid rgba(255,255,255,0.1); transition:all 0.2s; min-width:120px;
    }
    .btn-primary { background:linear-gradient(145deg, #1e4b7c, #0d2e4e); box-shadow:0 15px 25px -8px #001e3c, 0 4px 0 0 #3f8dcc inset; border:1px solid #4f9fdf; padding:1.4rem 3rem; font-size:1.8rem; }
    .btn:hover { transform:translateY(-3px); background:rgba(45,75,120,0.7); }
    .btn:active { transform:translateY(2px); }
    .pop-animation { animation:countPop 0.2s ease-out; }
    @keyframes countPop { 0%{ transform:scale(1); } 50%{ transform:scale(1.08); } 100%{ transform:scale(1); } }

    .long-press-btn { background:#3a2e4a; border:1px solid #b185db; box-shadow:0 8px 0 #2a1e3a, 0 12px 20px -10px #000; margin-top:20px; padding:1rem 1.8rem; font-size:1.4rem; }
    .footer-note { margin-top:2.5rem; font-size:0.85rem; opacity:0.6; display:flex; justify-content:center; gap:18px; }

    @media (max-width:550px) {
      .counter-card { padding:2rem 1.2rem; }
      #countValue { font-size:7rem; }
      .btn { padding:0.9rem 1.2rem; font-size:1.2rem; min-width:90px; }
      .btn-primary { padding:1.1rem 1.8rem; font-size:1.5rem; }
      .settings-panel { width:280px; right:10px; }
      .top-buttons { top:16px; right:16px; }
    }
  </style>
</head>
<body id="appBody" class="theme-deep">
  <div class="subtitle-layer" id="subtitleLayer"></div>

  <div class="counter-card" id="mainCard">
    <div class="top-buttons">
      <div class="icon-btn" id="soundToggleBtn" title="音效设置"><i class="fas fa-volume-up"></i></div>
      <div class="icon-btn" id="appearanceToggleBtn" title="外观设置"><i class="fas fa-palette"></i></div>
    </div>

    <!-- 音效面板 -->
    <div class="settings-panel" id="soundPanel">
      <div class="panel-title"><i class="fas fa-sliders-h"></i> 音效设置</div>
      <div class="setting-item">
        <div class="setting-label"><i class="fas fa-volume-up"></i> 启用音效 <label class="toggle-switch"><input type="checkbox" id="soundEnabledCheckbox" checked><span class="slider"></span></label></div>
      </div>
      <div class="setting-item">
        <div class="setting-label"><i class="fas fa-music"></i> 预设音效</div>
        <select id="presetSoundSelect">
          <option value="click" selected>🔘 经典咔嗒</option>
          <option value="pop">💧 清脆 Pop</option>
          <option value="chime">🔔 风铃 Chime</option>
          <option value="ding">✨ 叮 Ding</option>
        </select>
        <div style="margin-top:8px;"><button class="sound-test-btn" id="testSoundBtn"><i class="fas fa-play"></i> 试听</button></div>
      </div>
      <div class="setting-item">
        <div class="setting-label"><i class="fas fa-upload"></i> 自定义音效</div>
        <label class="upload-btn" for="customAudioFile"><i class="fas fa-folder-open"></i> 选择音频</label>
        <input type="file" id="customAudioFile" accept="audio/*">
        <div style="font-size:0.8rem; margin-top:6px; opacity:0.7;" id="customFileName">未选择文件</div>
      </div>
    </div>

    <!-- 外观面板 (含字幕彩蛋设置) -->
    <div class="settings-panel" id="appearancePanel">
      <div class="panel-title"><i class="fas fa-paint-brush"></i> 外观设置</div>
      <div class="setting-item">
        <div class="setting-label"><i class="fas fa-fill-drip"></i> 背景主题</div>
        <select id="themeSelect">
          <option value="deep" selected>🌌 深邃夜空</option>
          <option value="sunset">🌅 日落紫调</option>
          <option value="ocean">🌊 深海蔚蓝</option>
          <option value="forest">🌲 森林暗绿</option>
          <option value="rose">🌹 玫瑰暗红</option>
        </select>
      </div>
      <div class="setting-item">
        <div class="setting-label"><i class="fas fa-blender-phone"></i> 毛玻璃模糊 <label class="toggle-switch"><input type="checkbox" id="blurEnabledCheckbox" checked><span class="slider"></span></label></div>
      </div>
      <div class="setting-item" style="border-top:1px solid #3a5f8a; padding-top:15px; margin-top:5px;">
        <div class="setting-label"><i class="fas fa-comment-dots"></i> 字幕彩蛋 <label class="toggle-switch"><input type="checkbox" id="subtitleEnabledCheckbox" checked><span class="slider"></span></label></div>
      </div>
      <div class="setting-item">
        <div class="setting-label"><i class="fas fa-edit"></i> 自定义字幕 (逗号分隔)</div>
        <input type="text" id="subtitleCustomInput" class="text-input" placeholder="例如: 加油, 你最棒, 666" value="黄毛，你个sb【帅b】,shl，你个大sb【帅b】">
        <div style="font-size:0.75rem; margin-top:5px; opacity:0.6;">用英文逗号分隔多条字幕</div>
      </div>
    </div>

    <!-- 主内容 -->
    <div class="counter-header">
      <i class="fas fa-fingerprint"></i>
      <h1>轻触 · 计数器</h1>
    </div>

    <div class="count-display"><span id="countValue">0</span><span class="count-unit">次</span></div>

    <div class="last-tap"><i class="fas fa-history"></i><span>上次点击</span><span id="lastTapTime">—</span></div>

    <div class="button-group">
      <button class="btn" id="decrementBtn"><i class="fas fa-minus-circle"></i> 减一</button>
      <button class="btn btn-primary" id="incrementBtn"><i class="fas fa-plus-circle"></i> 加一</button>
      <button class="btn" id="resetBtn" style="background:#3a2e4a;"><i class="fas fa-undo-alt"></i> 重置</button>
    </div>

    <div class="button-group">
      <button class="btn long-press-btn" id="longPressBtn"><i class="fas fa-fingerprint"></i> 长按连击 (按住累加)</button>
    </div>

    <div class="footer-note">
      <span><i class="far fa-save"></i> 自动保存</span>
      <span><i class="fas fa-music"></i> 灵动音效</span>
      <span><i class="fas fa-mobile-alt"></i> 长按连击</span>
    </div>
  </div>

  <script>
    (function(){
      "use strict";

      // DOM
      const bodyEl = document.getElementById('appBody');
      const mainCard = document.getElementById('mainCard');
      const countSpan = document.getElementById('countValue');
      const lastTapSpan = document.getElementById('lastTapTime');
      const subtitleLayer = document.getElementById('subtitleLayer');
      
      const incrementBtn = document.getElementById('incrementBtn');
      const decrementBtn = document.getElementById('decrementBtn');
      const resetBtn = document.getElementById('resetBtn');
      const longPressBtn = document.getElementById('longPressBtn');

      // 音效元素
      const soundToggleBtn = document.getElementById('soundToggleBtn');
      const soundPanel = document.getElementById('soundPanel');
      const soundEnabledCheck = document.getElementById('soundEnabledCheckbox');
      const presetSelect = document.getElementById('presetSoundSelect');
      const customAudioInput = document.getElementById('customAudioFile');
      const customFileName = document.getElementById('customFileName');
      const testSoundBtn = document.getElementById('testSoundBtn');

      // 外观元素
      const appearanceToggleBtn = document.getElementById('appearanceToggleBtn');
      const appearancePanel = document.getElementById('appearancePanel');
      const themeSelect = document.getElementById('themeSelect');
      const blurCheck = document.getElementById('blurEnabledCheckbox');
      const subtitleEnabledCheck = document.getElementById('subtitleEnabledCheckbox');
      const subtitleCustomInput = document.getElementById('subtitleCustomInput');

      // 存储键
      const STORAGE_COUNT = 'counter_value';
      const STORAGE_SOUND_ENABLED = 'counter_sound';
      const STORAGE_PRESET = 'counter_preset';
      const STORAGE_THEME = 'counter_theme';
      const STORAGE_BLUR = 'counter_blur';
      const STORAGE_SUBTITLE_ENABLED = 'counter_subtitle_enabled';
      const STORAGE_SUBTITLE_TEXTS = 'counter_subtitle_texts';

      // 状态
      let currentCount = 0;
      let soundEnabled = true;
      let currentSoundType = 'click';
      let customAudioObject = null, customAudioURL = null;
      let audioCtx = null;
      let longPressInterval = null;
      let subtitleEnabled = true;
      let subtitleTexts = ["黄毛，你个sb【帅b】", "shl，你个大sb【帅b】"];

      // 更新字幕数组 (根据输入框解析)
      function updateSubtitleTextsFromInput() {
        const raw = subtitleCustomInput.value.trim();
        if (!raw) { subtitleTexts = []; return; }
        subtitleTexts = raw.split(',').map(s => s.trim()).filter(s => s !== '');
        if (subtitleTexts.length === 0) subtitleTexts = ["✨"];
      }

      // 掉落字幕
      function spawnSubtitle() {
        if (!subtitleEnabled || subtitleTexts.length === 0) return;
        const text = subtitleTexts[Math.floor(Math.random() * subtitleTexts.length)];
        const el = document.createElement('div');
        el.className = 'falling-subtitle';
        el.textContent = text;
        el.style.left = (10 + Math.random() * 80) + '%';
        el.style.animationDuration = (3 + Math.random() * 2) + 's';
        subtitleLayer.appendChild(el);
        setTimeout(() => { if(el.parentNode) el.remove(); }, 5000);
      }

      // 音效
      function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); if(audioCtx.state==='suspended') audioCtx.resume(); }
      function playSound() {
        if(!soundEnabled) return;
        if(currentSoundType==='custom' && customAudioObject) { customAudioObject.currentTime=0; customAudioObject.play().catch(()=>{}); return; }
        try {
          initAudio(); if(!audioCtx) return;
          const now = audioCtx.currentTime;
          const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
          osc.connect(gain); gain.connect(audioCtx.destination);
          if(currentSoundType==='click') { osc.type='sine'; osc.frequency.value=800; gain.gain.setValueAtTime(0.15,now); gain.gain.exponentialRampToValueAtTime(0.001,now+0.08); osc.start(); osc.stop(now+0.08); }
          else if(currentSoundType==='pop') { osc.type='triangle'; osc.frequency.value=500; gain.gain.setValueAtTime(0.2,now); gain.gain.exponentialRampToValueAtTime(0.001,now+0.06); osc.start(); osc.stop(now+0.06); }
          else if(currentSoundType==='chime') {
            const osc2=audioCtx.createOscillator(), gain2=audioCtx.createGain();
            osc2.connect(gain2); gain2.connect(audioCtx.destination);
            osc.type='sine'; osc.frequency.value=1200; osc2.type='sine'; osc2.frequency.value=1600;
            gain.gain.setValueAtTime(0.1,now); gain.gain.exponentialRampToValueAtTime(0.001,now+0.15);
            gain2.gain.setValueAtTime(0.08,now); gain2.gain.exponentialRampToValueAtTime(0.001,now+0.15);
            osc.start(); osc2.start(); osc.stop(now+0.15); osc2.stop(now+0.15);
          } else { osc.type='sine'; osc.frequency.value=700; gain.gain.setValueAtTime(0.1,now); gain.gain.exponentialRampToValueAtTime(0.001,now+0.07); osc.start(); osc.stop(now+0.07); }
        } catch(e){}
      }

      function doIncrement() {
        currentCount++; countSpan.textContent = currentCount; localStorage.setItem(STORAGE_COUNT, currentCount);
        countSpan.classList.add('pop-animation'); setTimeout(()=>countSpan.classList.remove('pop-animation'),200);
        lastTapSpan.textContent = new Date().toLocaleTimeString('zh', {hour12:false});
        playSound(); spawnSubtitle();
      }
      function doDecrement() {
        if(currentCount>0) { currentCount--; countSpan.textContent = currentCount; localStorage.setItem(STORAGE_COUNT, currentCount); }
        countSpan.classList.add('pop-animation'); setTimeout(()=>countSpan.classList.remove('pop-animation'),200);
        lastTapSpan.textContent = new Date().toLocaleTimeString('zh', {hour12:false});
        playSound(); spawnSubtitle();
      }
      function doReset() {
        if(currentCount!==0) { currentCount=0; countSpan.textContent=0; localStorage.setItem(STORAGE_COUNT,0); }
        countSpan.classList.add('pop-animation'); setTimeout(()=>countSpan.classList.remove('pop-animation'),200);
        lastTapSpan.textContent = new Date().toLocaleTimeString('zh', {hour12:false});
        playSound(); spawnSubtitle();
      }

      function startLongPress() { if(longPressInterval) clearInterval(longPressInterval); longPressInterval = setInterval(() => doIncrement(), 150); }
      function stopLongPress() { if(longPressInterval) { clearInterval(longPressInterval); longPressInterval=null; } }

      // 加载所有设置
      function loadSettings() {
        currentCount = parseInt(localStorage.getItem(STORAGE_COUNT)) || 0; countSpan.textContent = currentCount;
        soundEnabled = localStorage.getItem(STORAGE_SOUND_ENABLED)!=='false'; soundEnabledCheck.checked = soundEnabled;
        const preset = localStorage.getItem(STORAGE_PRESET) || 'click'; currentSoundType = preset; presetSelect.value = preset;
        const theme = localStorage.getItem(STORAGE_THEME) || 'deep'; bodyEl.className = `theme-${theme}`; themeSelect.value = theme;
        const blur = localStorage.getItem(STORAGE_BLUR)!=='false'; blurCheck.checked = blur;
        mainCard.classList.toggle('blur-enabled', blur); mainCard.classList.toggle('blur-disabled', !blur);
        subtitleEnabled = localStorage.getItem(STORAGE_SUBTITLE_ENABLED)!=='false'; subtitleEnabledCheck.checked = subtitleEnabled;
        const savedSubtitles = localStorage.getItem(STORAGE_SUBTITLE_TEXTS);
        if (savedSubtitles) { subtitleCustomInput.value = savedSubtitles; updateSubtitleTextsFromInput(); }
        else { subtitleCustomInput.value = subtitleTexts.join(','); }
        lastTapSpan.textContent = '—';
      }

      function saveSoundSettings() { localStorage.setItem(STORAGE_SOUND_ENABLED, soundEnabled); localStorage.setItem(STORAGE_PRESET, currentSoundType); }
      function saveAppearanceSettings() { localStorage.setItem(STORAGE_THEME, themeSelect.value); localStorage.setItem(STORAGE_BLUR, blurCheck.checked); }

      // 事件绑定
      incrementBtn.addEventListener('click', doIncrement);
      decrementBtn.addEventListener('click', doDecrement);
      resetBtn.addEventListener('click', doReset);

      longPressBtn.addEventListener('mousedown', startLongPress);
      longPressBtn.addEventListener('mouseup', stopLongPress);
      longPressBtn.addEventListener('mouseleave', stopLongPress);
      longPressBtn.addEventListener('touchstart', (e)=>{ e.preventDefault(); startLongPress(); });
      longPressBtn.addEventListener('touchend', stopLongPress);
      longPressBtn.addEventListener('touchcancel', stopLongPress);

      window.addEventListener('keydown', (e)=>{
        if(e.key==='+'||e.key==='=') { e.preventDefault(); doIncrement(); }
        else if(e.key==='-'||e.key==='_') { e.preventDefault(); doDecrement(); }
        else if(e.key===' ') { e.preventDefault(); doIncrement(); }
        else if(e.key==='r'||e.key==='R') { e.preventDefault(); doReset(); }
      });

      // 音效面板交互
      soundToggleBtn.addEventListener('click',(e)=>{ e.stopPropagation(); soundPanel.classList.toggle('show'); soundToggleBtn.classList.toggle('active'); });
      appearanceToggleBtn.addEventListener('click',(e)=>{ e.stopPropagation(); appearancePanel.classList.toggle('show'); appearanceToggleBtn.classList.toggle('active'); });
      document.addEventListener('click',(e)=>{
        if(!soundPanel.contains(e.target)&&!soundToggleBtn.contains(e.target)) { soundPanel.classList.remove('show'); soundToggleBtn.classList.remove('active'); }
        if(!appearancePanel.contains(e.target)&&!appearanceToggleBtn.contains(e.target)) { appearancePanel.classList.remove('show'); appearanceToggleBtn.classList.remove('active'); }
      });

      soundEnabledCheck.addEventListener('change',(e)=>{ soundEnabled=e.target.checked; saveSoundSettings(); });
      presetSelect.addEventListener('change',(e)=>{
        currentSoundType=e.target.value;
        if(customAudioObject){ customAudioObject=null; if(customAudioURL) URL.revokeObjectURL(customAudioURL); customAudioURL=null; customFileName.textContent='未选择文件'; }
        saveSoundSettings();
      });
      customAudioInput.addEventListener('change',(e)=>{
        const f=e.target.files[0]; if(!f) return;
        if(customAudioURL) URL.revokeObjectURL(customAudioURL);
        customAudioURL=URL.createObjectURL(f); customAudioObject=new Audio(customAudioURL); customAudioObject.volume=0.5;
        customFileName.textContent=f.name; currentSoundType='custom'; presetSelect.value=''; saveSoundSettings();
      });
      testSoundBtn.addEventListener('click',()=>playSound());

      // 外观设置
      themeSelect.addEventListener('change',(e)=>{ bodyEl.className = `theme-${e.target.value}`; saveAppearanceSettings(); });
      blurCheck.addEventListener('change',(e)=>{
        mainCard.classList.toggle('blur-enabled', e.target.checked); mainCard.classList.toggle('blur-disabled', !e.target.checked);
        saveAppearanceSettings();
      });
      subtitleEnabledCheck.addEventListener('change',(e)=>{
        subtitleEnabled = e.target.checked;
        localStorage.setItem(STORAGE_SUBTITLE_ENABLED, subtitleEnabled);
      });
      subtitleCustomInput.addEventListener('input', ()=>{
        updateSubtitleTextsFromInput();
        localStorage.setItem(STORAGE_SUBTITLE_TEXTS, subtitleCustomInput.value);
      });

      // 解锁音频
      document.body.addEventListener('click', ()=>{ if(audioCtx?.state==='suspended') audioCtx.resume(); }, {once:true});

      loadSettings();
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🍰 甜品百层 · 甜心跳跃</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 30% 20%, #3b2535, #1e121c);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
      padding: 8px;
    }

    .game-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 780px;
      width: 100%;
    }

    /* 头部 */
    .hero-bar {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      padding: 0 6px;
    }

    .title-section {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(50, 25, 45, 0.8);
      backdrop-filter: blur(8px);
      padding: 6px 16px;
      border-radius: 60px;
      border: 1px solid #f9b7d0;
      box-shadow: 0 4px 0 #2d1525;
    }
    .game-icon { font-size: 1.8rem; }
    .game-title {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ffe2f0, #ffb3c6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .stats-group {
      display: flex;
      gap: 8px;
    }
    .depth-panel, .lives-panel {
      display: flex;
      align-items: center;
      background: #2d1a28;
      border-radius: 40px;
      padding: 4px 14px;
      border: 1px solid #e598b0;
      box-shadow: inset 0 2px 5px #000, 0 4px 0 #1e0f18;
      gap: 6px;
    }
    .depth-number { font-size: 1.8rem; font-weight: 900; color: #ffe3b0; }
    .heart-icon { font-size: 1.6rem; }
    #livesCount { font-size: 1.6rem; font-weight: bold; color: #ffb0b0; }

    /* 画布 */
    .canvas-container {
      position: relative;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 30px #00000080, 0 0 0 3px #8f5e7a;
      width: 100%;
    }
    #gameCanvas {
      display: block;
      width: 100%;
      height: auto;
      background: #1e1320;
      cursor: pointer;
      outline: none;
      touch-action: none;  /* 禁止手势滚动 */
    }

    /* 控制栏 (桌面+移动) */
    .action-bar {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .btn {
      background: #3f2a3a;
      border: none;
      border-bottom: 5px solid #25161f;
      color: #fde3ef;
      font-weight: bold;
      font-size: 1.1rem;
      padding: 10px 18px;
      min-width: 110px;
      border-radius: 50px;
      box-shadow: 0 5px 0 #1a0f16, 0 6px 12px #00000060;
      transition: 0.05s;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn.small { padding: 8px 14px; min-width: 80px; }
    .btn:active { transform: translateY(5px); border-bottom-width: 1px; }

    /* 触摸控制 (移动端显示) */
    .touch-controls {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 10px;
      width: 100%;
    }
    .touch-btn {
      background: #5a3e55;
      border: none;
      border-bottom: 6px solid #2f1e2a;
      color: white;
      font-size: 2.4rem;
      font-weight: bold;
      width: 90px;
      height: 90px;
      border-radius: 50%;
      box-shadow: 0 8px 0 #22161f, 0 10px 20px black;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.05s;
      touch-action: manipulation;
    }
    .touch-btn:active {
      transform: translateY(6px);
      box-shadow: 0 2px 0 #22161f, 0 8px 15px black;
    }
    .touch-btn.jump {
      background: #b85c7a;
      border-bottom-color: #6e344a;
    }

    /* 设置抽屉 (侧滑) */
    .settings-drawer {
      position: fixed;
      top: 0; right: 0;
      width: 280px;
      max-width: 85vw;
      height: 100vh;
      background: #2f1d2bb0;
      backdrop-filter: blur(20px);
      box-shadow: -8px 0 30px #00000060;
      border-left: 2px solid #e598b0;
      padding: 24px 16px;
      transform: translateX(100%);
      transition: transform 0.25s ease;
      z-index: 1000;
      overflow-y: auto;
      color: #fde3ef;
    }
    .settings-drawer.open {
      transform: translateX(0);
    }
    .drawer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      font-size: 1.6rem;
    }
    .close-btn {
      background: none;
      border: none;
      color: #ffc0d0;
      font-size: 2rem;
      cursor: pointer;
    }
    .setting-item {
      margin-bottom: 24px;
    }
    .setting-item label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      color: #ffd9e6;
    }
    .setting-item select, .setting-item input[type="range"] {
      width: 100%;
      padding: 8px 10px;
      background: #3f2638;
      border: 1px solid #d99fb8;
      border-radius: 30px;
      color: white;
      font-size: 1rem;
    }
    .slider-value {
      display: inline-block;
      margin-left: 8px;
      min-width: 40px;
    }
    .upload-area {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .overlay {
      position: fixed;
      top:0;left:0;width:100%;height:100%;
      background: #00000060;
      z-index: 999;
      display: none;
    }
    .overlay.show { display: block; }

    .hint-text {
      color: #dbb0c0;
      text-align: center;
      margin-top: 6px;
      font-size: 0.9rem;
    }

    @media (min-width: 768px) {
      .touch-controls { display: none; }
    }
    @media (max-width: 600px) {
      .game-title { font-size: 1.3rem; }
      .btn { font-size: 1rem; padding: 8px 12px; }
    }
  </style>
</head>
<body>
<div class="game-wrapper">
  <div class="hero-bar">
    <div class="title-section">
      <span class="game-icon">🍭</span>
      <span class="game-title">甜品·跃百层</span>
    </div>
    <div class="stats-group">
      <div class="depth-panel">
        <span>📉</span>
        <span class="depth-number" id="depthDisplay">000</span>
      </div>
      <div class="lives-panel">
        <span class="heart-icon">❤️</span>
        <span id="livesCount">3</span>
      </div>
    </div>
  </div>

  <div class="canvas-container">
    <canvas id="gameCanvas" width="700" height="800" tabindex="0"></canvas>
  </div>

  <!-- 主控制栏 -->
  <div class="action-bar">
    <button class="btn" id="restartButton">🔄 重开</button>
    <button class="btn small" id="pauseButton">⏸️ 暂停</button>
    <button class="btn small" id="settingsToggle">⚙️ 设置</button>
  </div>

  <!-- 移动端触摸按钮 -->
  <div class="touch-controls">
    <button class="touch-btn" id="touchLeft">←</button>
    <button class="touch-btn jump" id="touchJump">↑</button>
    <button class="touch-btn" id="touchRight">→</button>
  </div>

  <div class="hint-text">← → 移动 · ↑/空格 跳跃 · 拾取❤️回血</div>
</div>

<!-- 遮罩层 + 设置抽屉 -->
<div class="overlay" id="overlay"></div>
<div class="settings-drawer" id="settingsDrawer">
  <div class="drawer-header">
    <span>⚙️ 游戏设置</span>
    <button class="close-btn" id="closeDrawer">&times;</button>
  </div>
  <div class="setting-item">
    <label>⌨️ 键位预设</label>
    <select id="keyPresetSelect">
      <option value="arrows" selected>方向键 (↑跳)</option>
      <option value="wasd">WASD (W/空格跳)</option>
      <option value="ijkl">IJKL (I/空格跳)</option>
    </select>
  </div>
  <div class="setting-item">
    <label>⏸️ 暂停快捷键</label>
    <select id="pauseKeySelect">
      <option value="KeyP" selected>P</option>
      <option value="Escape">Esc</option>
      <option value="KeyQ">Q</option>
    </select>
  </div>
  <div class="setting-item">
    <label>📏 角色大小 <span id="sizeValue" class="slider-value">28</span></label>
    <input type="range" id="sizeSlider" min="20" max="45" value="28" step="1">
  </div>
  <div class="setting-item">
    <label>🦘 跳跃力度 <span id="jumpValue" class="slider-value">-7.2</span></label>
    <input type="range" id="jumpSlider" min="-10.0" max="-4.5" value="-7.2" step="0.1">
  </div>
  <div class="setting-item">
    <label>🖼️ 自定义皮肤</label>
    <div class="upload-area">
      <button class="btn small" id="uploadSkinBtn" style="pointer-events:none;">选择图片</button>
      <input type="file" id="skinUpload" accept="image/*" style="display:none;">
      <button class="btn small" id="resetSkinBtn">还原</button>
    </div>
  </div>
  <div class="setting-item">
    <label>🌸 主题</label>
    <select id="themeSelect">
      <option value="default" selected>粉樱</option>
      <option value="forest">薄荷</option>
      <option value="lava">浆果</option>
    </select>
  </div>
  <p style="margin-top:20px; font-size:0.9rem; opacity:0.8;">—— 甜品下落 · 甜心守护 ——</p>
</div>

<script>
  (function(){
    "use strict";
    // ---------- 画布 ----------
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const depthSpan = document.getElementById('depthDisplay');
    const livesSpan = document.getElementById('livesCount');
    const W = 700, H = 800;
    canvas.width = W; canvas.height = H;
    
    // 圆角矩形方法
    CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
      if(w<2*r) r=w/2; if(h<2*r) r=h/2;
      this.moveTo(x+r,y); this.lineTo(x+w-r,y); this.quadraticCurveTo(x+w,y,x+w,y+r);
      this.lineTo(x+w,y+h-r); this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
      this.lineTo(x+r,y+h); this.quadraticCurveTo(x,y+h,x,y+h-r);
      this.lineTo(x,y+r); this.quadraticCurveTo(x,y,x+r,y); return this;
    };

    // ---------- 可调参数 ----------
    let BASE_PLAYER_W = 28, BASE_PLAYER_H = 28;
    let JUMP_FORCE = -7.2;
    const GRAVITY = 0.48;
    const FRICTION_AIR = 0.80, FRICTION_GROUND = 0.88;
    const ACCEL = 0.9;
    const MAX_SPEED_X = 6.8;
    
    const PLATFORM_H = 14;
    const PLATFORM_SPEED = 2.5;
    const MIN_PLAT_W = 70, MAX_PLAT_W = 125;
    const GENERATE_COOLDOWN_BASE = 34;   // 增加冷却，减少平台
    const MAX_PLATFORMS = 22;
    
    const MAX_LIVES = 5;
    let lives = 3;
    let invulnerable = false;
    let invulnerableTimer = 0;
    
    let gameActive = false;
    let paused = false;
    let depth = 0;
    
    let player = { x:0, y:0, vx:0, vy:0, width:BASE_PLAYER_W, height:BASE_PLAYER_H, isGrounded:false, jumpPressed:false };
    let platforms = [];
    let powerups = [];
    let generateCooldown = 0;
    
    // 按键
    let left = false, right = false, up = false, space = false;
    
    // 键位映射
    const keyMap = { left:'ArrowLeft', right:'ArrowRight', jump1:'ArrowUp', jump2:'Space' };
    const presets = {
      arrows:  { left:'ArrowLeft', right:'ArrowRight', jump1:'ArrowUp', jump2:'Space' },
      wasd:    { left:'KeyA', right:'KeyD', jump1:'KeyW', jump2:'Space' },
      ijkl:    { left:'KeyJ', right:'KeyL', jump1:'KeyI', jump2:'Space' },
    };
    let pauseKeyCode = 'KeyP';
    
    let customSkinImage = null;
    let currentTheme = 0;  // 0粉樱 1薄荷 2浆果
    
    // 动画
    let playerScale = 1.0, landSquash = 0, scorePop = 0, lastDepth = 0;
    
    // 音频
    let audioCtx = null;
    function initAudio(){ if(!audioCtx) try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); audioCtx.resume(); } catch(e){} }
    function playSound(t){ 
      if(!audioCtx||audioCtx.state!=='running') return; 
      const now=audioCtx.currentTime; const o=audioCtx.createOscillator(), g=audioCtx.createGain(); 
      o.connect(g); g.connect(audioCtx.destination); 
      let f=440,d=0.12,v=0.15; 
      if(t==='jump'){ f=620;d=0.1;v=0.2;o.type='triangle'; } 
      else if(t==='land'){ f=180;d=0.08;v=0.22;o.type='sine'; } 
      else if(t==='score'){ f=880;d=0.07;v=0.12; } 
      else if(t==='gameover'){ f=250;d=0.25;v=0.3;o.type='sawtooth'; } 
      else if(t==='heart'){ f=1046;d=0.15;v=0.18;o.type='sine'; } 
      g.gain.setValueAtTime(v,now); g.gain.exponentialRampToValueAtTime(0.01,now+d); 
      o.frequency.value=f; o.start(); o.stop(now+d); 
    }
    function enableAudio(){ initAudio(); if(audioCtx?.state==='suspended') audioCtx.resume(); }
    
    // UI更新
    function updateUI(){ 
      depthSpan.textContent = String(Math.min(999,Math.floor(depth))).padStart(3,'0'); 
      livesSpan.textContent = lives; 
    }
    
    function respawnPlayer(){
      player.x = Math.min(W - player.width - 10, Math.max(10, W/2 - player.width/2));
      player.y = 30;
      player.vx = 0; player.vy = 0;
      invulnerable = true;
      invulnerableTimer = 80;
    }
    
    function resetGame(){
      gameActive = true; paused = false;
      document.getElementById('pauseButton').textContent = '⏸️ 暂停';
      lives = 3; depth = 0; lastDepth = 0;
      updateUI();
      player.width = BASE_PLAYER_W; player.height = BASE_PLAYER_H;
      player.x = W/2 - player.width/2; player.y = 340;
      player.vx = 0; player.vy = 0; player.isGrounded = false;
      invulnerable = false; invulnerableTimer = 0;
      playerScale=1; landSquash=0;
      platforms = []; powerups = [];
      const baseY = H-70;
      platforms.push({ x:W/2-80, y:baseY, w:130, h:PLATFORM_H, counted:false, dessertType:0 });
      platforms.push({ x:130, y:baseY-80, w:100, h:PLATFORM_H, counted:false, dessertType:1 });
      platforms.push({ x:430, y:baseY-150, w:110, h:PLATFORM_H, counted:false, dessertType:2 });
      for(let i=0;i<4;i++) platforms.push({ x:30+Math.random()*(W-150), y:150+Math.random()*250, w:70+Math.floor(Math.random()*55), h:PLATFORM_H, counted:false, dessertType: Math.floor(Math.random()*5) });
      generateCooldown=10;
      left=right=up=space=false;
      playSound('click');
    }
    
    function spawnPlatform(){
      if(!gameActive||paused||platforms.length>=MAX_PLATFORMS) return;
      const w = MIN_PLAT_W + Math.floor(Math.random()*(MAX_PLAT_W-MIN_PLAT_W));
      platforms.push({ x:10+Math.random()*(W-w-20), y:H+10+Math.random()*30, w, h:PLATFORM_H, counted:false, dessertType: Math.floor(Math.random()*5) });
    }
    
    function spawnHeart(){
      if(!gameActive||paused) return;
      if(powerups.length > 5) return;
      if(Math.random() > 0.008) return;  // 降低生成概率
      const x = 20 + Math.random()*(W-60);
      powerups.push({ x, y: H+20, w:24, h:24 });
    }
    
    function applyPhysics(){
      if(!gameActive||paused) return;
      
      if(invulnerable){ invulnerableTimer--; if(invulnerableTimer<=0) invulnerable=false; }
      
      if(left) player.vx -= ACCEL;
      if(right) player.vx += ACCEL;
      const friction = player.isGrounded ? FRICTION_GROUND : FRICTION_AIR;
      player.vx *= friction;
      if(Math.abs(player.vx)<0.15) player.vx=0;
      player.vx = Math.min(MAX_SPEED_X, Math.max(-MAX_SPEED_X, player.vx));
      
      player.vy += GRAVITY;
      if(player.vy>13) player.vy=13;
      
      const jumpKey = up || space;
      if(jumpKey && player.isGrounded && !player.jumpPressed) {
        player.vy = JUMP_FORCE;
        player.isGrounded = false;
        player.jumpPressed = true;
        playerScale = 1.25;
        playSound('jump');
      }
      if(!jumpKey) player.jumpPressed = false;
      
      player.x += player.vx;
      if(player.x<0) { player.x=0; player.vx=0; }
      if(player.x+player.width>W) { player.x=W-player.width; player.vx=0; }
      
      player.y += player.vy;
      let grounded = false;
      for(let iter=0; iter<6; iter++) {
        for(let pl of platforms) {
          if(player.x < pl.x+pl.w && player.x+player.width > pl.x && player.y < pl.y+pl.h && player.y+player.height > pl.y) {
            const ovL = (player.x+player.width)-pl.x, ovR = (pl.x+pl.w)-player.x, ovT = (player.y+player.height)-pl.y, ovB = (pl.y+pl.h)-player.y;
            const minO = Math.min(ovL, ovR, ovT, ovB);
            if(minO === ovT && player.vy>=0) { player.y = pl.y - player.height; player.vy=0; grounded=true; }
            else if(minO === ovB && player.vy<0) { player.y = pl.y+pl.h; player.vy=0.1; }
            else if(minO === ovL && player.vx>0) { player.x = pl.x-player.width; player.vx=0; }
            else if(minO === ovR && player.vx<0) { player.x = pl.x+pl.w; player.vx=0; }
          }
        }
      }
      
      const wasGrounded = player.isGrounded;
      player.isGrounded = grounded;
      if(!wasGrounded && grounded) { landSquash=8; playerScale=0.85; playSound('land'); }
      
      for(let pl of platforms) pl.y -= PLATFORM_SPEED;
      for(let pw of powerups) pw.y -= PLATFORM_SPEED;
      
      platforms = platforms.filter(pl => {
        if(pl.y+pl.h < 0) { if(!pl.counted) { pl.counted=true; depth++; if(depth>lastDepth){ scorePop=12; playSound('score'); } lastDepth=depth; updateUI(); } return false; }
        return true;
      });
      
      powerups = powerups.filter(pw => {
        if(pw.y + pw.h < 0) return false;
        if(player.x < pw.x+pw.w && player.x+player.width > pw.x && player.y < pw.y+pw.h && player.y+player.height > pw.y) {
          if(lives < MAX_LIVES) { lives++; updateUI(); playSound('heart'); }
          return false;
        }
        return true;
      });
      
      if(gameActive && !paused) {
        if(generateCooldown<=0) { spawnPlatform(); generateCooldown = Math.max(20, GENERATE_COOLDOWN_BASE - Math.floor(depth/18)); }
        else generateCooldown--;
        spawnHeart();
      }
      
      if(gameActive && !invulnerable && (player.y+player.height >= H || player.y <= 0)) {
        lives--; updateUI(); playSound('gameover');
        if(lives <= 0) { gameActive = false; }
        else { respawnPlayer(); }
      }
      
      playerScale = playerScale*0.9 + 1.0*0.1;
      landSquash *= 0.7;
      scorePop = Math.max(0, scorePop-1);
    }
    
    function drawDessertPlatform(pl){
      const type = pl.dessertType || 0;
      let grad = ctx.createLinearGradient(pl.x, pl.y, pl.x+pl.w, pl.y+pl.h);
      if(type===0) { grad.addColorStop(0,'#d99fb0'); grad.addColorStop(1,'#b2667a'); }
      else if(type===1) { grad.addColorStop(0,'#f7c0c6'); grad.addColorStop(1,'#e08b9c'); }
      else if(type===2) { grad.addColorStop(0,'#e3a0b5'); grad.addColorStop(1,'#c46b84'); }
      else if(type===3) { grad.addColorStop(0,'#dbb2c4'); grad.addColorStop(1,'#b47b94'); }
      else { grad.addColorStop(0,'#f2d0d6'); grad.addColorStop(1,'#d49aaa'); }
      ctx.fillStyle = grad;
      ctx.shadowBlur = 14; ctx.shadowColor = '#ffb0c0';
      ctx.beginPath(); ctx.roundRect(pl.x, pl.y, pl.w, pl.h, 10); ctx.fill();
      ctx.shadowBlur = 6; ctx.fillStyle = '#fff9f0';
      for(let i=0;i<pl.w;i+=18) { ctx.beginPath(); ctx.arc(pl.x+i+8, pl.y+4, 3, 0, 2*Math.PI); ctx.fill(); }
      ctx.shadowBlur = 0; ctx.strokeStyle = '#fbe4ec'; ctx.lineWidth=2; ctx.stroke();
    }
    
    function drawHeart(x,y,w,h){
      ctx.save(); ctx.translate(x+w/2, y+h/2); ctx.scale(0.8,0.8);
      ctx.fillStyle = '#ff4d6d'; ctx.shadowBlur=20; ctx.shadowColor='#ffb0b0';
      ctx.beginPath(); ctx.moveTo(0, -h/2.5);
      ctx.bezierCurveTo(-w/2, -h/1.5, -w, h/5, 0, h/1.8);
      ctx.bezierCurveTo(w, h/5, w/2, -h/1.5, 0, -h/2.5);
      ctx.fill(); ctx.restore();
    }
    
    function draw(){
      let grad = ctx.createLinearGradient(0,0,0,H);
      if(currentTheme===0){ grad.addColorStop(0,'#2a1a28'); grad.addColorStop(0.7,'#4a2e45'); }
      else if(currentTheme===1){ grad.addColorStop(0,'#1a3a32'); grad.addColorStop(0.7,'#2a5a48'); }
      else { grad.addColorStop(0,'#3d1e22'); grad.addColorStop(0.6,'#752e38'); }
      ctx.fillStyle = grad; ctx.fillRect(0,0,W,H);
      
      for(let pl of platforms) drawDessertPlatform(pl);
      for(let pw of powerups) drawHeart(pw.x, pw.y, pw.w, pw.h);
      
      const drawPlayer = () => {
        const cx=player.x+player.width/2, cy=player.y+player.height/2;
        ctx.save(); ctx.translate(cx,cy); ctx.scale(playerScale, playerScale*(1-landSquash*0.02)); ctx.translate(-cx,-cy);
        if(customSkinImage?.complete) ctx.drawImage(customSkinImage, player.x, player.y, player.width, player.height);
        else {
          ctx.shadowBlur=22; ctx.shadowColor='#f0b87b';
          const g=ctx.createRadialGradient(player.x+5,player.y+5,3,cx,cy,18); g.addColorStop(0,'#f5d742'); g.addColorStop(1,'#d68b2c');
          ctx.fillStyle=g; ctx.fillRect(player.x,player.y,player.width,player.height);
          ctx.fillStyle='#191e2b'; ctx.beginPath(); ctx.arc(player.x+8,player.y+9,5,0,2*Math.PI); ctx.fill(); ctx.beginPath(); ctx.arc(player.x+player.width-8,player.y+9,5,0,2*Math.PI); ctx.fill();
          ctx.fillStyle='#f5f9ff'; ctx.beginPath(); ctx.arc(player.x+6,player.y+7,2.5,0,2*Math.PI); ctx.fill(); ctx.beginPath(); ctx.arc(player.x+player.width-10,player.y+7,2.5,0,2*Math.PI); ctx.fill();
        } ctx.restore();
      };
      if(invulnerable && (Math.floor(Date.now()/100)%2)) {} else drawPlayer();
      
      ctx.font='bold 32px Poppins'; ctx.fillStyle='#fce5f0'; ctx.fillText(`🍰 ${Math.floor(depth)}`,20,70);
      if(!gameActive) { ctx.fillStyle='#1a0f16cc'; ctx.fillRect(0,0,W,H); ctx.font='bold 48px Segoe UI'; ctx.fillStyle='#ffc0d0'; ctx.textAlign='center'; ctx.fillText('💔 游戏结束',W/2,H/2); }
      else if(paused) { ctx.fillStyle='#2a1a28cc'; ctx.fillRect(0,0,W,H); ctx.font='bold 48px Segoe UI'; ctx.fillStyle='#ffe0f0'; ctx.textAlign='center'; ctx.fillText('⏸ 暂停',W/2,H/2); }
      ctx.textAlign='left';
    }
    
    function gameLoop(){ if(gameActive&&!paused) applyPhysics(); draw(); requestAnimationFrame(gameLoop); }
    
    // 事件绑定
    function handleKeyDown(e){
      enableAudio();
      if(e.code === pauseKeyCode) { e.preventDefault(); if(gameActive){ paused=!paused; document.getElementById('pauseButton').textContent = paused?'▶️ 继续':'⏸️ 暂停'; } return; }
      if(!gameActive) { if(e.code==='KeyR') resetGame(); return; }
      if(paused) return;
      if(e.code===keyMap.left) { left=true; e.preventDefault(); }
      if(e.code===keyMap.right) { right=true; e.preventDefault(); }
      if(e.code===keyMap.jump1) { up=true; e.preventDefault(); }
      if(e.code===keyMap.jump2) { space=true; e.preventDefault(); }
      if(e.code==='KeyR') resetGame();
    }
    function handleKeyUp(e){
      if(e.code===keyMap.left) { left=false; e.preventDefault(); }
      if(e.code===keyMap.right) { right=false; e.preventDefault(); }
      if(e.code===keyMap.jump1) { up=false; e.preventDefault(); }
      if(e.code===keyMap.jump2) { space=false; e.preventDefault(); }
    }
    window.addEventListener('keydown', handleKeyDown); window.addEventListener('keyup', handleKeyUp);
    
    // 触摸控制
    document.getElementById('touchLeft').addEventListener('touchstart', (e)=>{ e.preventDefault(); left=true; });
    document.getElementById('touchLeft').addEventListener('touchend', (e)=>{ e.preventDefault(); left=false; });
    document.getElementById('touchRight').addEventListener('touchstart', (e)=>{ e.preventDefault(); right=true; });
    document.getElementById('touchRight').addEventListener('touchend', (e)=>{ e.preventDefault(); right=false; });
    document.getElementById('touchJump').addEventListener('touchstart', (e)=>{ e.preventDefault(); up=true; space=true; });
    document.getElementById('touchJump').addEventListener('touchend', (e)=>{ e.preventDefault(); up=false; space=false; });
    
    // 按钮
    document.getElementById('restartButton').onclick=()=>{ enableAudio(); resetGame(); };
    document.getElementById('pauseButton').onclick=()=>{ if(gameActive){ paused=!paused; document.getElementById('pauseButton').textContent = paused?'▶️ 继续':'⏸️ 暂停'; } };
    
    // 设置抽屉
    const drawer = document.getElementById('settingsDrawer');
    const overlay = document.getElementById('overlay');
    document.getElementById('settingsToggle').onclick = ()=>{ drawer.classList.add('open'); overlay.classList.add('show'); };
    document.getElementById('closeDrawer').onclick = ()=>{ drawer.classList.remove('open'); overlay.classList.remove('show'); };
    overlay.onclick = ()=>{ drawer.classList.remove('open'); overlay.classList.remove('show'); };
    
    // 设置项绑定
    document.getElementById('keyPresetSelect').onchange = e => { Object.assign(keyMap, presets[e.target.value]); };
    document.getElementById('pauseKeySelect').onchange = e => { pauseKeyCode = e.target.value; };
    document.getElementById('sizeSlider').oninput = e => { 
      BASE_PLAYER_W = BASE_PLAYER_H = parseInt(e.target.value); 
      player.width = BASE_PLAYER_W; player.height = BASE_PLAYER_H;
      document.getElementById('sizeValue').textContent = e.target.value;
    };
    document.getElementById('jumpSlider').oninput = e => { 
      JUMP_FORCE = parseFloat(e.target.value); 
      document.getElementById('jumpValue').textContent = JUMP_FORCE.toFixed(1);
    };
    document.getElementById('themeSelect').onchange = e => { currentTheme = {default:0, forest:1, lava:2}[e.target.value]; };
    
    const skinInput = document.getElementById('skinUpload');
    document.getElementById('uploadSkinBtn').addEventListener('click', ()=> skinInput.click());
    skinInput.onchange = e => { const f=e.target.files[0]; if(f){ const r=new FileReader(); r.onload=ev=>{ const i=new Image(); i.src=ev.target.result; i.onload=()=>customSkinImage=i; }; r.readAsDataURL(f); } };
    document.getElementById('resetSkinBtn').onclick = ()=>{ customSkinImage=null; skinInput.value=''; };
    
    canvas.addEventListener('touchstart', (e)=> e.preventDefault());
    canvas.addEventListener('click', ()=>{ enableAudio(); canvas.focus(); });
    
    resetGame(); gameLoop();
    document.body.addEventListener('click', enableAudio, {once:true});
  })();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🍰 甜品百层 · 粉甜跳跃 🍫</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 30% 10%, #2a1e2e, #150e18);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
      padding: 16px;
    }

    .game-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 860px;
      width: 100%;
    }

    /* 头部 */
    .hero-bar {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      padding: 0 8px;
    }

    .title-section {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(40, 20, 40, 0.7);
      backdrop-filter: blur(8px);
      padding: 6px 22px 6px 18px;
      border-radius: 60px;
      border: 1px solid #f9b7d0;
      box-shadow: 0 6px 0 #2d1525, inset 0 1px 4px #ffc0d5;
    }

    .game-icon { font-size: 2.1rem; filter: drop-shadow(0 4px 4px #00000060); }
    .game-title {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ffe2f0, #ffb3c6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .stats-panel {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .depth-panel {
      display: flex;
      align-items: center;
      background: #2d1a28;
      border-radius: 48px;
      padding: 5px 18px;
      border: 1px solid #e598b0;
      box-shadow: inset 0 2px 5px #000, 0 6px 0 #1e0f18;
      gap: 8px;
    }
    .depth-icon { font-size: 1.8rem; }
    .depth-number {
      font-size: 2.2rem;
      font-weight: 900;
      color: #ffe3b0;
      text-shadow: 0 0 16px #ffa5c0;
    }

    .lives-panel {
      display: flex;
      align-items: center;
      background: #2d1a28;
      border-radius: 48px;
      padding: 5px 18px;
      border: 1px solid #e598b0;
      box-shadow: inset 0 2px 5px #000, 0 6px 0 #1e0f18;
      gap: 6px;
    }
    .heart-icon { font-size: 2rem; line-height: 1; }

    /* 画布 */
    .canvas-container {
      position: relative;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 25px 30px #00000080, 0 0 0 3px #8f5e7a, inset 0 0 30px #00000080;
    }
    #gameCanvas {
      display: block;
      width: 100%;
      height: auto;
      background: #1e1320;
      cursor: pointer;
      outline: none;
    }

    /* 控制栏 */
    .control-bar {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 15px;
    }
    .btn {
      background: #3f2a3a;
      border: none;
      border-bottom: 5px solid #25161f;
      color: #fde3ef;
      font-weight: bold;
      font-size: 1.1rem;
      padding: 10px 20px;
      min-width: 130px;
      border-radius: 50px;
      box-shadow: 0 7px 0 #1a0f16, 0 8px 16px #00000070;
      transition: all 0.07s;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn.small { padding: 8px 16px; min-width: 90px; font-size: 1rem; }
    .btn:hover { background: #624a5a; transform: translateY(3px); box-shadow: 0 4px 0 #1a0f16; }
    .btn:active { transform: translateY(7px); border-bottom-width: 1px; }

    .theme-selector {
      display: flex;
      gap: 8px;
      background: #2f1f2bb0;
      backdrop-filter: blur(8px);
      padding: 6px 14px;
      border-radius: 48px;
      border: 1px solid #f2a7c0;
    }
    .theme-btn {
      background: #4a2e40;
      border: none;
      border-bottom: 3px solid #2a1922;
      color: #f5cedf;
      padding: 6px 14px;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 3px 0 #1f121a;
    }
    .theme-btn.active { background: #c77da0; color: white; transform: translateY(2px); }

    .hint-box {
      color: #f5d0e0;
      background: #221723b0;
      padding: 6px 18px;
      border-radius: 40px;
      backdrop-filter: blur(5px);
      border: 1px solid #d48ca8;
    }
    kbd {
      background: #3d2640;
      color: #ffd0b0;
      padding: 4px 12px;
      border-radius: 30px;
      font-weight: 700;
    }

    /* 设置行 */
    .settings-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 12px;
    }
    .slider-container {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #261a22b0;
      padding: 5px 16px;
      border-radius: 40px;
      color: #fcd5e4;
    }
    select, input[type="range"] {
      background: #3e2638;
      color: white;
      border: 1px solid #d99fb8;
      border-radius: 30px;
      padding: 6px 12px;
    }
    .footer-note { margin-top: 8px; color: #b28ba0; }
  </style>
</head>
<body>
<div class="game-wrapper">
  <div class="hero-bar">
    <div class="title-section">
      <span class="game-icon">🍭</span>
      <span class="game-title">甜品·跃百层</span>
    </div>
    <div class="stats-panel">
      <div class="depth-panel">
        <span class="depth-icon">📉</span>
        <span class="depth-number" id="depthDisplay">000</span>
      </div>
      <div class="lives-panel" id="livesPanel">
        <span class="heart-icon">❤️</span>
        <span id="livesCount" style="font-size:1.8rem; font-weight:bold; color:#ffb0b0;">3</span>
      </div>
    </div>
  </div>

  <div class="canvas-container">
    <canvas id="gameCanvas" width="700" height="800" tabindex="0"></canvas>
  </div>

  <div class="control-bar">
    <button class="btn" id="restartButton">🔄 重新开始</button>
    <button class="btn small" id="pauseButton">⏸️ 暂停</button>
    <div class="theme-selector">
      <button class="theme-btn active" data-theme="default">🌸 粉樱</button>
      <button class="theme-btn" data-theme="forest">🍃 薄荷</button>
      <button class="theme-btn" data-theme="lava">🍓 浆果</button>
    </div>
    <div class="hint-box" id="keyHint"><kbd>←</kbd> <kbd>→</kbd> <kbd>↑</kbd></div>
  </div>

  <div class="settings-row">
    <div style="display:flex; gap:15px; align-items:center;">
      <div style="color:#fcc;">⌨️ 键位</div>
      <select id="keyPresetSelect" class="keybind-select" style="width:140px;">
        <option value="arrows" selected>方向键</option>
        <option value="wasd">WASD</option>
        <option value="ijkl">IJKL</option>
      </select>
    </div>
    <div class="slider-container">
      <span>📏 角色大小</span>
      <input type="range" id="sizeSlider" min="20" max="45" value="28" step="1">
      <span id="sizeValue">28</span>
    </div>
    <div style="display:flex; gap:8px; align-items:center;">
      <span style="color:#fcc;">⏸️ 暂停键</span>
      <select id="pauseKeySelect">
        <option value="KeyP" selected>P</option>
        <option value="Escape">Esc</option>
        <option value="KeyQ">Q</option>
        <option value="Backquote">`</option>
      </select>
    </div>
    <div class="file-upload-wrapper" style="position:relative;">
      <button class="btn small" style="pointer-events:none;">🖼️ 皮肤</button>
      <input type="file" id="skinUpload" accept="image/*" style="position:absolute; left:0; top:0; opacity:0; width:100%; height:100%; cursor:pointer;">
    </div>
    <button class="btn small" id="resetSkinBtn">🔄 默认</button>
  </div>
  <div class="footer-note">—— 拾取❤️回血 · 三条命 · 甜品平台 ——</div>
</div>

<script>
  (function(){
    "use strict";
    // ---------- 画布 ----------
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const depthSpan = document.getElementById('depthDisplay');
    const livesSpan = document.getElementById('livesCount');
    const W = 700, H = 800;
    canvas.width = W; canvas.height = H;
    canvas.focus();

    // ---------- 玩家基础尺寸 (可调) ----------
    let BASE_PLAYER_W = 28, BASE_PLAYER_H = 28;
    const GRAVITY = 0.48;
    const FRICTION_AIR = 0.80, FRICTION_GROUND = 0.88;
    const ACCEL = 0.9;
    const MAX_SPEED_X = 6.8;
    const JUMP_FORCE = -7.2;
    
    const PLATFORM_H = 14;
    const PLATFORM_SPEED = 2.5;
    const MIN_PLAT_W = 70, MAX_PLAT_W = 125;
    const GENERATE_COOLDOWN_BASE = 26;
    const MAX_PLATFORMS = 30;
    
    // 生命系统
    const MAX_LIVES = 5;
    let lives = 3;
    let invulnerable = false;
    let invulnerableTimer = 0;
    
    // 游戏状态
    let gameActive = false;
    let paused = false;
    let depth = 0;
    
    let player = {
      x: W/2 - BASE_PLAYER_W/2, y: 360,
      vx: 0, vy: 0,
      width: BASE_PLAYER_W, height: BASE_PLAYER_H,
      isGrounded: false, jumpPressed: false,
    };
    
    let platforms = [];
    let powerups = [];   // 心心道具
    let generateCooldown = 0;
    
    // 按键
    let left = false, right = false, up = false, space = false;
    
    // 键位映射
    const keyMap = { left:'ArrowLeft', right:'ArrowRight', jump1:'ArrowUp', jump2:'Space' };
    const presets = {
      arrows:  { left:'ArrowLeft', right:'ArrowRight', jump1:'ArrowUp', jump2:'Space' },
      wasd:    { left:'KeyA', right:'KeyD', jump1:'KeyW', jump2:'Space' },
      ijkl:    { left:'KeyJ', right:'KeyL', jump1:'KeyI', jump2:'Space' },
    };
    
    let pauseKeyCode = 'KeyP';
    
    // 皮肤
    let customSkinImage = null;
    let currentTheme = 0;
    
    // 动画
    let playerScale = 1.0, landSquash = 0, scorePop = 0, lastDepth = 0;
    
    // 音频
    let audioCtx = null;
    function initAudio(){ if(!audioCtx) try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); audioCtx.resume(); } catch(e){} }
    function playSound(t){ if(!audioCtx||audioCtx.state!=='running') return; const now=audioCtx.currentTime; const o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); let f=440,d=0.12,v=0.15; if(t==='jump'){ f=620;d=0.1;v=0.2;o.type='triangle'; } else if(t==='land'){ f=180;d=0.08;v=0.22;o.type='sine'; } else if(t==='score'){ f=880;d=0.07;v=0.12; } else if(t==='gameover'){ f=250;d=0.25;v=0.3;o.type='sawtooth'; } else if(t==='heart'){ f=1046;d=0.15;v=0.18;o.type='sine'; } g.gain.setValueAtTime(v,now); g.gain.exponentialRampToValueAtTime(0.01,now+d); o.frequency.value=f; o.start(); o.stop(now+d); }
    function enableAudio(){ initAudio(); if(audioCtx?.state==='suspended') audioCtx.resume(); }
    
    // UI更新
    function updateUI(){ depthSpan.textContent = String(Math.min(999,Math.floor(depth))).padStart(3,'0'); livesSpan.textContent = lives; }
    
    // 重置位置 (重生)
    function respawnPlayer(){
      player.x = Math.min(W - player.width - 10, Math.max(10, W/2 - player.width/2));
      player.y = 30;
      player.vx = 0; player.vy = 0;
      invulnerable = true;
      invulnerableTimer = 80; // 无敌帧
    }
    
    function resetGame(){
      gameActive = true; paused = false;
      document.getElementById('pauseButton').textContent = '⏸️ 暂停';
      lives = 3; depth = 0; lastDepth = 0;
      updateUI();
      player.width = BASE_PLAYER_W; player.height = BASE_PLAYER_H;
      player.x = W/2 - player.width/2; player.y = 340;
      player.vx = 0; player.vy = 0; player.isGrounded = false;
      invulnerable = false; invulnerableTimer = 0;
      playerScale=1; landSquash=0;
      platforms = []; powerups = [];
      const baseY = H-70;
      platforms.push({ x:W/2-80, y:baseY, w:130, h:PLATFORM_H, counted:false, dessertType:0 });
      platforms.push({ x:130, y:baseY-80, w:100, h:PLATFORM_H, counted:false, dessertType:1 });
      platforms.push({ x:430, y:baseY-150, w:110, h:PLATFORM_H, counted:false, dessertType:2 });
      for(let i=0;i<6;i++) platforms.push({ x:30+Math.random()*(W-150), y:150+Math.random()*300, w:70+Math.floor(Math.random()*55), h:PLATFORM_H, counted:false, dessertType: Math.floor(Math.random()*5) });
      generateCooldown=10;
      left=right=up=space=false;
      playSound('click');
    }
    
    function spawnPlatform(){
      if(!gameActive||paused||platforms.length>=MAX_PLATFORMS) return;
      const w = MIN_PLAT_W + Math.floor(Math.random()*(MAX_PLAT_W-MIN_PLAT_W));
      platforms.push({ x:10+Math.random()*(W-w-20), y:H+10+Math.random()*30, w, h:PLATFORM_H, counted:false, dessertType: Math.floor(Math.random()*5) });
    }
    
    function spawnHeart(){
      if(!gameActive||paused) return;
      if(powerups.length > 8) return;
      const x = 20 + Math.random()*(W-60);
      powerups.push({ x, y: H+20, w:24, h:24 });
    }
    
    // 物理
    function applyPhysics(){
      if(!gameActive||paused) return;
      
      if(invulnerable){ invulnerableTimer--; if(invulnerableTimer<=0) invulnerable=false; }
      
      if(left) player.vx -= ACCEL;
      if(right) player.vx += ACCEL;
      const friction = player.isGrounded ? FRICTION_GROUND : FRICTION_AIR;
      player.vx *= friction;
      if(Math.abs(player.vx)<0.15) player.vx=0;
      player.vx = Math.min(MAX_SPEED_X, Math.max(-MAX_SPEED_X, player.vx));
      
      player.vy += GRAVITY;
      if(player.vy>13) player.vy=13;
      
      const jumpKey = up || space;
      if(jumpKey && player.isGrounded && !player.jumpPressed) {
        player.vy = JUMP_FORCE;
        player.isGrounded = false;
        player.jumpPressed = true;
        playerScale = 1.25;
        playSound('jump');
      }
      if(!jumpKey) player.jumpPressed = false;
      
      player.x += player.vx;
      if(player.x<0) { player.x=0; player.vx=0; }
      if(player.x+player.width>W) { player.x=W-player.width; player.vx=0; }
      
      player.y += player.vy;
      let grounded = false;
      for(let iter=0; iter<6; iter++) {
        for(let pl of platforms) {
          if(player.x < pl.x+pl.w && player.x+player.width > pl.x && player.y < pl.y+pl.h && player.y+player.height > pl.y) {
            const ovL = (player.x+player.width)-pl.x, ovR = (pl.x+pl.w)-player.x, ovT = (player.y+player.height)-pl.y, ovB = (pl.y+pl.h)-player.y;
            const minO = Math.min(ovL, ovR, ovT, ovB);
            if(minO === ovT && player.vy>=0) { player.y = pl.y - player.height; player.vy=0; grounded=true; }
            else if(minO === ovB && player.vy<0) { player.y = pl.y+pl.h; player.vy=0.1; }
            else if(minO === ovL && player.vx>0) { player.x = pl.x-player.width; player.vx=0; }
            else if(minO === ovR && player.vx<0) { player.x = pl.x+pl.w; player.vx=0; }
          }
        }
      }
      
      const wasGrounded = player.isGrounded;
      player.isGrounded = grounded;
      if(!wasGrounded && grounded) { landSquash=8; playerScale=0.85; playSound('land'); }
      
      // 平台/道具上升
      for(let pl of platforms) pl.y -= PLATFORM_SPEED;
      for(let pw of powerups) pw.y -= PLATFORM_SPEED;
      
      // 移除平台计分
      platforms = platforms.filter(pl => {
        if(pl.y+pl.h < 0) { if(!pl.counted) { pl.counted=true; depth++; if(depth>lastDepth){ scorePop=12; playSound('score'); } lastDepth=depth; updateUI(); } return false; }
        return true;
      });
      
      // 心心拾取
      powerups = powerups.filter(pw => {
        if(pw.y + pw.h < 0) return false;
        if(player.x < pw.x+pw.w && player.x+player.width > pw.x && player.y < pw.y+pw.h && player.y+player.height > pw.y) {
          if(lives < MAX_LIVES) { lives++; updateUI(); playSound('heart'); }
          return false;
        }
        return true;
      });
      
      // 生成
      if(gameActive && !paused) {
        if(generateCooldown<=0) { spawnPlatform(); generateCooldown = Math.max(16, GENERATE_COOLDOWN_BASE - Math.floor(depth/15)); }
        else generateCooldown--;
        if(Math.random()<0.02) spawnHeart();
      }
      
      // 死亡检测
      if(gameActive && !invulnerable && (player.y+player.height >= H || player.y <= 0)) {
        lives--;
        updateUI();
        playSound('gameover');
        if(lives <= 0) { gameActive = false; }
        else { respawnPlayer(); }
      }
      
      playerScale = playerScale*0.9 + 1.0*0.1;
      landSquash *= 0.7;
      scorePop = Math.max(0, scorePop-1);
    }
    
    // 绘制甜品平台 (粉色系)
    function drawDessertPlatform(pl){
      const type = pl.dessertType || 0;
      let grad = ctx.createLinearGradient(pl.x, pl.y, pl.x+pl.w, pl.y+pl.h);
      if(type===0) { grad.addColorStop(0,'#d99fb0'); grad.addColorStop(1,'#b2667a'); } // 草莓巧克力
      else if(type===1) { grad.addColorStop(0,'#f7c0c6'); grad.addColorStop(1,'#e08b9c'); } // 马卡龙粉
      else if(type===2) { grad.addColorStop(0,'#e3a0b5'); grad.addColorStop(1,'#c46b84'); } // 玫瑰
      else if(type===3) { grad.addColorStop(0,'#dbb2c4'); grad.addColorStop(1,'#b47b94'); } // 紫薯
      else { grad.addColorStop(0,'#f2d0d6'); grad.addColorStop(1,'#d49aaa'); }
      ctx.fillStyle = grad;
      ctx.shadowBlur = 14; ctx.shadowColor = '#ffb0c0';
      ctx.beginPath();
      ctx.roundRect(pl.x, pl.y, pl.w, pl.h, 10);
      ctx.fill();
      // 糖霜点
      ctx.shadowBlur = 6;
      ctx.fillStyle = '#fff9f0';
      for(let i=0;i<pl.w;i+=18) {
        ctx.beginPath(); ctx.arc(pl.x+i+8, pl.y+4, 3, 0, 2*Math.PI); ctx.fill();
      }
      ctx.shadowBlur = 0;
      ctx.strokeStyle = '#fbe4ec'; ctx.lineWidth=2; ctx.stroke();
    }
    CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){ if(w<2*r) r=w/2; if(h<2*r) r=h/2; this.moveTo(x+r,y); this.lineTo(x+w-r,y); this.quadraticCurveTo(x+w,y,x+w,y+r); this.lineTo(x+w,y+h-r); this.quadraticCurveTo(x+w,y+h,x+w-r,y+h); this.lineTo(x+r,y+h); this.quadraticCurveTo(x,y+h,x,y+h-r); this.lineTo(x,y+r); this.quadraticCurveTo(x,y,x+r,y); return this; };
    
    function drawHeart(x,y,w,h){
      ctx.save(); ctx.translate(x+w/2, y+h/2); ctx.scale(0.8,0.8);
      ctx.fillStyle = '#ff4d6d'; ctx.shadowBlur=20; ctx.shadowColor='#ffb0b0';
      ctx.beginPath(); ctx.moveTo(0, -h/2.5);
      ctx.bezierCurveTo(-w/2, -h/1.5, -w, h/5, 0, h/1.8);
      ctx.bezierCurveTo(w, h/5, w/2, -h/1.5, 0, -h/2.5);
      ctx.fill(); ctx.restore();
    }
    
    function draw(){
      // 背景
      let grad = ctx.createLinearGradient(0,0,0,H);
      if(currentTheme===0){ grad.addColorStop(0,'#2a1a28'); grad.addColorStop(0.7,'#4a2e45'); }
      else if(currentTheme===1){ grad.addColorStop(0,'#1a3a32'); grad.addColorStop(0.7,'#2a5a48'); }
      else { grad.addColorStop(0,'#3d1e22'); grad.addColorStop(0.6,'#752e38'); }
      ctx.fillStyle = grad; ctx.fillRect(0,0,W,H);
      
      // 平台
      for(let pl of platforms) drawDessertPlatform(pl);
      // 心心道具
      for(let pw of powerups) drawHeart(pw.x, pw.y, pw.w, pw.h);
      
      // 玩家 (带无敌闪烁)
      const drawPlayerNormal = () => {
        const cx=player.x+player.width/2, cy=player.y+player.height/2;
        ctx.save(); ctx.translate(cx,cy); ctx.scale(playerScale, playerScale*(1-landSquash*0.02)); ctx.translate(-cx,-cy);
        if(customSkinImage?.complete) ctx.drawImage(customSkinImage, player.x, player.y, player.width, player.height);
        else {
          ctx.shadowBlur=22; ctx.shadowColor='#f0b87b';
          const g=ctx.createRadialGradient(player.x+5,player.y+5,3,cx,cy,18); g.addColorStop(0,'#f5d742'); g.addColorStop(1,'#d68b2c');
          ctx.fillStyle=g; ctx.fillRect(player.x,player.y,player.width,player.height);
          ctx.fillStyle='#191e2b'; ctx.beginPath(); ctx.arc(player.x+8,player.y+9,5,0,2*Math.PI); ctx.fill(); ctx.beginPath(); ctx.arc(player.x+player.width-8,player.y+9,5,0,2*Math.PI); ctx.fill();
          ctx.fillStyle='#f5f9ff'; ctx.beginPath(); ctx.arc(player.x+6,player.y+7,2.5,0,2*Math.PI); ctx.fill(); ctx.beginPath(); ctx.arc(player.x+player.width-10,player.y+7,2.5,0,2*Math.PI); ctx.fill();
        } ctx.restore();
      };
      if(invulnerable && (Math.floor(Date.now()/100)%2)) {} else drawPlayerNormal();
      
      // UI文字
      ctx.font='bold 32px Poppins'; ctx.fillStyle='#fce5f0'; ctx.shadowBlur=12; ctx.fillText(`🍰 ${Math.floor(depth)}`,20,70);
      if(!gameActive) { ctx.fillStyle='#1a0f16cc'; ctx.fillRect(0,0,W,H); ctx.font='bold 52px Segoe UI'; ctx.fillStyle='#ffc0d0'; ctx.textAlign='center'; ctx.fillText('💔 游戏结束',W/2,H/2); }
      else if(paused) { ctx.fillStyle='#2a1a28cc'; ctx.fillRect(0,0,W,H); ctx.font='bold 52px Segoe UI'; ctx.fillStyle='#ffe0f0'; ctx.textAlign='center'; ctx.fillText('⏸ 暂停',W/2,H/2); }
      ctx.textAlign='left'; ctx.shadowBlur=0;
    }
    
    function gameLoop(){ if(gameActive&&!paused) applyPhysics(); draw(); requestAnimationFrame(gameLoop); }
    
    // 事件
    function handleKeyDown(e){
      enableAudio();
      if(e.code === pauseKeyCode) { e.preventDefault(); if(gameActive){ paused=!paused; document.getElementById('pauseButton').textContent = paused?'▶️ 继续':'⏸️ 暂停'; } return; }
      if(!gameActive) { if(e.code==='KeyR') resetGame(); return; }
      if(paused) return;
      if(e.code===keyMap.left) { left=true; e.preventDefault(); }
      if(e.code===keyMap.right) { right=true; e.preventDefault(); }
      if(e.code===keyMap.jump1) { up=true; e.preventDefault(); }
      if(e.code===keyMap.jump2) { space=true; e.preventDefault(); }
      if(e.code==='KeyR') resetGame();
    }
    function handleKeyUp(e){
      if(e.code===keyMap.left) { left=false; e.preventDefault(); }
      if(e.code===keyMap.right) { right=false; e.preventDefault(); }
      if(e.code===keyMap.jump1) { up=false; e.preventDefault(); }
      if(e.code===keyMap.jump2) { space=false; e.preventDefault(); }
    }
    window.addEventListener('keydown', handleKeyDown); window.addEventListener('keyup', handleKeyUp);
    
    // UI绑定
    document.getElementById('restartButton').onclick=()=>{ enableAudio(); resetGame(); };
    document.getElementById('pauseButton').onclick=()=>{ if(gameActive){ paused=!paused; document.getElementById('pauseButton').textContent = paused?'▶️ 继续':'⏸️ 暂停'; } };
    document.querySelectorAll('.theme-btn').forEach(b=>b.onclick=()=>{ document.querySelectorAll('.theme-btn').forEach(t=>t.classList.remove('active')); b.classList.add('active'); currentTheme = {default:0, forest:1, lava:2}[b.dataset.theme]; });
    document.getElementById('keyPresetSelect').onchange=e=>{ Object.assign(keyMap, presets[e.target.value]); updateHint(); };
    document.getElementById('pauseKeySelect').onchange=e=>{ pauseKeyCode = e.target.value; };
    document.getElementById('sizeSlider').oninput=e=>{ const v=parseInt(e.target.value); BASE_PLAYER_W=v; BASE_PLAYER_H=v; player.width=v; player.height=v; document.getElementById('sizeValue').textContent=v; };
    document.getElementById('skinUpload').onchange=e=>{ const f=e.target.files[0]; if(f){ const r=new FileReader(); r.onload=ev=>{ const i=new Image(); i.src=ev.target.result; i.onload=()=>customSkinImage=i; }; r.readAsDataURL(f); } };
    document.getElementById('resetSkinBtn').onclick=()=>{ customSkinImage=null; document.getElementById('skinUpload').value=''; };
    function updateHint(){ const l=getKeyName(keyMap.left), r=getKeyName(keyMap.right), j=getKeyName(keyMap.jump1); document.getElementById('keyHint').innerHTML=`<kbd>${l}</kbd> <kbd>${r}</kbd> <kbd>${j}</kbd>`; }
    function getKeyName(c){ if(c==='ArrowLeft') return'←'; if(c==='ArrowRight') return'→'; if(c==='ArrowUp') return'↑'; if(c.startsWith('Key')) return c.slice(3); return c; }
    updateHint();
    
    canvas.onclick=()=>{ enableAudio(); canvas.focus(); };
    resetGame(); gameLoop();
    document.body.addEventListener('click', enableAudio, {once:true});
  })();
</script>
</body>
</html>

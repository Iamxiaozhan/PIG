<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🍰 甜品百层 · 修复版</title>
  <!-- Firebase SDK (可选，若不配置则使用本地模拟排行) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <style>
    /* 全局样式保持不变，只增加摇杆相关样式（暂时注释） */
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
    body { background: #1e121c; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif; padding: 0; margin: 0; }
    .game-wrapper { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 780px; height: 100vh; max-height: 100vh; padding: 6px 4px; background: radial-gradient(circle at 30% 20%, #3b2535, #1e121c); }
    .hero-bar { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 0 4px 4px; }
    .title-section { display: flex; align-items: center; gap: 4px; background: rgba(50, 25, 45, 0.8); backdrop-filter: blur(8px); padding: 5px 12px; border-radius: 40px; border: 1px solid #f9b7d0; box-shadow: 0 3px 0 #2d1525; }
    .game-icon { font-size: 1.5rem; }
    .game-title { font-size: 1.3rem; font-weight: 800; background: linear-gradient(135deg, #ffe2f0, #ffb3c6); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .stats-group { display: flex; gap: 5px; }
    .depth-panel, .lives-panel { display: flex; align-items: center; background: #2d1a28; border-radius: 30px; padding: 4px 10px; border: 1px solid #e598b0; box-shadow: inset 0 1px 4px #000, 0 3px 0 #1e0f18; gap: 4px; }
    .depth-number { font-size: 1.5rem; font-weight: 900; color: #ffe3b0; }
    .heart-icon { font-size: 1.3rem; }
    #livesCount { font-size: 1.3rem; font-weight: bold; color: #ffb0b0; }
    .canvas-container { position: relative; border-radius: 20px; overflow: hidden; box-shadow: 0 15px 25px #00000080, 0 0 0 3px #8f5e7a; width: 100%; flex: 1; min-height: 0; display: flex; }
    #gameCanvas { display: block; width: 100%; height: 100%; object-fit: contain; background: #1e1320; cursor: pointer; outline: none; touch-action: none; }
    .action-bar { margin-top: 6px; display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 8px; }
    .btn { background: #3f2a3a; border: none; border-bottom: 4px solid #25161f; color: #fde3ef; font-weight: bold; font-size: 1rem; padding: 8px 14px; min-width: 90px; border-radius: 40px; box-shadow: 0 4px 0 #1a0f16, 0 5px 10px #00000050; transition: 0.05s; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 4px; }
    .btn.small { padding: 7px 12px; min-width: 70px; }
    .btn:active { transform: translateY(4px); border-bottom-width: 1px; }
    .touch-controls { display: flex; justify-content: center; gap: 20px; margin: 8px 0 2px; }
    .touch-btn {
      background: #5a3e55; border: none; border-bottom: 5px solid #2f1e2a; color: white;
      font-size: 2rem; width: 75px; height: 75px; border-radius: 50%;
      box-shadow: 0 6px 0 #22161f, 0 8px 16px black;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: 0.05s;
      touch-action: manipulation;  /* 关键：禁止默认手势 */
      -webkit-touch-callout: none;
    }
    .touch-btn.jump { background: #b85c7a; border-bottom-color: #6e344a; }
    .touch-btn:active { transform: translateY(5px); box-shadow: 0 1px 0 #22161f, 0 6px 12px black; }
    .hint-text { color: #dbb0c0; font-size: 0.75rem; margin-top: 2px; }
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000000b0; display: none; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(4px); }
    .modal.show { display: flex; }
    .modal-content { background: #2f1d2b; border: 2px solid #e598b0; border-radius: 30px; padding: 20px; max-width: 400px; width: 90%; max-height: 70vh; overflow-y: auto; color: #fde3ef; box-shadow: 0 15px 30px black; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .modal-header h2 { color: #ffd0b0; }
    .close-modal { background: none; border: none; color: #ffc0d0; font-size: 2rem; cursor: pointer; }
    .rank-list { list-style: none; padding: 0; }
    .rank-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #b2667a; font-size: 1.2rem; }
    .rank-name { font-weight: bold; }
    .rank-score { color: #ffe3b0; }
    .input-nickname { width: 100%; padding: 10px; margin: 10px 0; background: #3f2638; border: 1px solid #d99fb8; border-radius: 30px; color: white; font-size: 1.1rem; }
    .submit-score-btn { background: #b85c7a; border: none; border-bottom: 4px solid #6e344a; color: white; padding: 10px; width: 100%; border-radius: 40px; font-weight: bold; cursor: pointer; }
    .settings-drawer { position: fixed; top: 0; right: 0; width: 300px; max-width: 85vw; height: 100vh; background: #2f1d2bf0; backdrop-filter: blur(20px); box-shadow: -8px 0 30px #00000060; border-left: 2px solid #e598b0; padding: 20px 16px; transform: translateX(100%); transition: transform 0.25s; z-index: 1000; overflow-y: auto; color: #fde3ef; }
    .settings-drawer.open { transform: translateX(0); }
    .drawer-header { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 1.5rem; }
    .close-btn { background: none; border: none; color: #ffc0d0; font-size: 2rem; cursor: pointer; }
    .setting-item { margin-bottom: 20px; }
    .setting-item label { display: block; margin-bottom: 5px; font-weight: 600; }
    select, input[type="range"] { width: 100%; padding: 8px; background: #3f2638; border: 1px solid #d99fb8; border-radius: 30px; color: white; font-size: 1rem; }
    .upload-area { display: flex; gap: 8px; flex-wrap: wrap; }
    .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: #00000060; z-index: 999; display: none; }
    .overlay.show { display: block; }
    .checkbox-item { display: flex; align-items: center; gap: 10px; }
    .checkbox-item input { width: 20px; height: 20px; }
    @media (min-width: 768px) { .touch-controls { display: none; } .game-wrapper { padding: 8px; } }
    @media (max-width: 480px) { .btn { font-size: 0.9rem; padding: 6px 10px; } }
  </style>
</head>
<body>
<div class="game-wrapper">
  <div class="hero-bar">
    <div class="title-section"><span class="game-icon">🍭</span><span class="game-title">甜品·修复版</span></div>
    <div class="stats-group">
      <div class="depth-panel"><span>📉</span><span class="depth-number" id="depthDisplay">000</span></div>
      <div class="lives-panel"><span class="heart-icon">❤️</span><span id="livesCount">3</span></div>
    </div>
  </div>
  <div class="canvas-container"><canvas id="gameCanvas" width="700" height="800" tabindex="0"></canvas></div>
  <div class="action-bar">
    <button class="btn" id="restartButton">🔄 重开</button>
    <button class="btn small" id="pauseButton">⏸️ 暂停</button>
    <button class="btn small" id="rankBtn">🏆 排行</button>
    <button class="btn small" id="settingsToggle">⚙️ 设置</button>
  </div>
  <div class="touch-controls">
    <button class="touch-btn" id="touchLeft">←</button>
    <button class="touch-btn jump" id="touchJump">↑</button>
    <button class="touch-btn" id="touchRight">→</button>
  </div>
  <div class="hint-text">← → 移动 · 拾❤回血 · 多点触控已优化</div>
</div>

<!-- 排行榜模态框 -->
<div class="modal" id="rankModal">
  <div class="modal-content">
    <div class="modal-header"><h2>🏆 排行榜</h2><button class="close-modal" id="closeRankModal">&times;</button></div>
    <div id="rankListContainer"><ul class="rank-list" id="rankList"></ul></div>
    <div id="submitScoreArea" style="display:none;">
      <input type="text" id="nicknameInput" class="input-nickname" placeholder="输入昵称" maxlength="12">
      <button class="submit-score-btn" id="submitScoreBtn">提交分数</button>
    </div>
    <p style="margin-top:12px; font-size:0.9rem; text-align:center;">—— 本地模拟排行 (可替换Firebase) ——</p>
  </div>
</div>

<!-- 设置抽屉 -->
<div class="overlay" id="overlay"></div>
<div class="settings-drawer" id="settingsDrawer">
  <div class="drawer-header"><span>⚙️ 设置</span><button class="close-btn" id="closeDrawer">&times;</button></div>
  <div class="setting-item"><label>⌨️ 键位</label><select id="keyPresetSelect"><option value="arrows" selected>方向键</option><option value="wasd">WASD</option><option value="ijkl">IJKL</option></select></div>
  <div class="setting-item"><label>⏸️ 暂停键</label><select id="pauseKeySelect"><option value="KeyP" selected>P</option><option value="Escape">Esc</option><option value="KeyQ">Q</option></select></div>
  <div class="setting-item"><label>📏 角色大小 <span id="sizeValue">45</span></label><input type="range" id="sizeSlider" min="30" max="80" value="45" step="1"></div>
  <div class="setting-item"><label>🦘 跳跃力度 <span id="jumpValue">7.2</span></label><input type="range" id="jumpSlider" min="4.5" max="10.0" value="7.2" step="0.1"></div>
  <div class="setting-item"><label>🧊 平滑度 (摩擦力) <span id="frictionValue">0.88</span></label><input type="range" id="frictionSlider" min="0.70" max="0.98" value="0.88" step="0.01"></div>
  <div class="setting-item"><label>🍰 平台生成速度 <span id="platformRateVal">1.0</span></label><input type="range" id="platformRateSlider" min="0.5" max="2.0" value="1.0" step="0.1"></div>
  <div class="setting-item"><label>❤️ 心心出现概率 <span id="heartRateVal">0.8</span></label><input type="range" id="heartRateSlider" min="0.0" max="2.5" value="0.8" step="0.1"></div>
  <div class="setting-item checkbox-item"><label>🔊 音效开关</label><input type="checkbox" id="soundToggle" checked></div>
  <div class="setting-item">
    <label>🖼️ 状态皮肤</label>
    <div class="upload-area">
      <button class="btn small" id="skin3Btn">❤️❤️❤️</button>
      <button class="btn small" id="skin2Btn">❤️❤️</button>
      <button class="btn small" id="skin1Btn">❤️</button>
      <button class="btn small" id="gameoverSkinBtn">💀结束图</button>
    </div>
    <input type="file" id="skinUpload" accept="image/*" style="display:none;">
    <button class="btn small" id="resetAllSkins" style="margin-top:8px;">还原默认</button>
  </div>
  <div class="setting-item"><label>🌸 主题</label><select id="themeSelect"><option value="default" selected>粉樱</option><option value="forest">薄荷</option><option value="lava">浆果</option></select></div>
</div>

<script>
  (function(){
    "use strict";
    
    // ---------- 排行榜：优先尝试Firebase，若未配置则使用本地模拟 ----------
    let db = null;
    let useFirebase = false;
    try {
      const firebaseConfig = {
        // 请替换为您的Firebase配置，留空则自动使用本地模拟
        apiKey: "",
        authDomain: "",
        projectId: "",
        storageBucket: "",
        messagingSenderId: "",
        appId: ""
      };
      if (firebaseConfig.apiKey) {
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        useFirebase = true;
        console.log("Firebase已初始化");
      }
    } catch(e) { useFirebase = false; }
    
    // 本地模拟排行榜存储
    let localRankings = [];
    const LOCAL_RANK_KEY = 'dessert_rankings';
    function loadLocalRankings() {
      try {
        const stored = localStorage.getItem(LOCAL_RANK_KEY);
        if(stored) localRankings = JSON.parse(stored);
        else localRankings = [];
      } catch(e){ localRankings = []; }
    }
    function saveLocalRankings() {
      localStorage.setItem(LOCAL_RANK_KEY, JSON.stringify(localRankings));
    }
    loadLocalRankings();
    
    // ---------- 画布 ----------
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const depthSpan = document.getElementById('depthDisplay');
    const livesSpan = document.getElementById('livesCount');
    const W = 700, H = 800;
    canvas.width = W; canvas.height = H;
    
    CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
      if(w<2*r) r=w/2; if(h<2*r) r=h/2;
      this.moveTo(x+r,y); this.lineTo(x+w-r,y); this.quadraticCurveTo(x+w,y,x+w,y+r);
      this.lineTo(x+w,y+h-r); this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
      this.lineTo(x+r,y+h); this.quadraticCurveTo(x,y+h,x,y+h-r);
      this.lineTo(x,y+r); this.quadraticCurveTo(x,y,x+r,y); return this;
    };

    const FIXED_TIMESTEP = 1000 / 60;
    let lastTimestamp = 0, accumulator = 0;
    let BASE_PLAYER_W = 45, BASE_PLAYER_H = 45;
    let JUMP_STRENGTH = 7.2;
    const GRAVITY = 0.48, FRICTION_AIR = 0.80, ACCEL = 0.9, MAX_SPEED_X = 6.8;
    let FRICTION_GROUND = 0.88;
    const PLATFORM_H = 14, PLATFORM_SPEED = 2.5, MIN_PLAT_W = 70, MAX_PLAT_W = 125, MAX_PLATFORMS = 22, MAX_LIVES = 3;
    
    let lives = 3, invulnerable = false, invulnerableTimer = 0, gameActive = false, paused = false, depth = 0;
    let player = { x:0, y:0, vx:0, vy:0, width:BASE_PLAYER_W, height:BASE_PLAYER_H, isGrounded:false, jumpPressed:false };
    let platforms = [], powerups = [], generateCooldown = 0;
    let platformSpawnRate = 1.0, heartSpawnProb = 0.8;
    let left = false, right = false, up = false, space = false;
    
    const keyMap = { left:'ArrowLeft', right:'ArrowRight', jump1:'ArrowUp', jump2:'Space' };
    const presets = { arrows: { left:'ArrowLeft', right:'ArrowRight', jump1:'ArrowUp', jump2:'Space' }, wasd: { left:'KeyA', right:'KeyD', jump1:'KeyW', jump2:'Space' }, ijkl: { left:'KeyJ', right:'KeyL', jump1:'KeyI', jump2:'Space' } };
    let pauseKeyCode = 'KeyP';
    let skin3 = null, skin2 = null, skin1 = null, skinGameover = null, currentTheme = 0;
    let playerScale = 1.0, landSquash = 0, scorePop = 0, lastDepth = 0;
    let soundEnabled = true, audioCtx = null;
    let lastScoreSubmitted = false, pendingScore = 0;
    
    function initAudio(){ if(!audioCtx) try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); audioCtx.resume(); } catch(e){} }
    function playSound(t){ 
      if(!soundEnabled || !audioCtx || audioCtx.state!=='running') return; 
      const now=audioCtx.currentTime; const o=audioCtx.createOscillator(), g=audioCtx.createGain(); 
      o.connect(g); g.connect(audioCtx.destination); 
      let f=440,d=0.12,v=0.15; 
      if(t==='jump'){ f=620;d=0.1;v=0.2;o.type='triangle'; } 
      else if(t==='land'){ f=180;d=0.08;v=0.22;o.type='sine'; } 
      else if(t==='score'){ f=880;d=0.07;v=0.12; } 
      else if(t==='gameover'){ f=250;d=0.25;v=0.3;o.type='sawtooth'; } 
      else if(t==='heart'){ f=1046;d=0.15;v=0.18;o.type='sine'; } 
      g.gain.setValueAtTime(v,now); g.gain.exponentialRampToValueAtTime(0.01,now+d); 
      o.frequency.value=f; o.start(); o.stop(now+d); 
    }
    function enableAudio(){ initAudio(); if(audioCtx?.state==='suspended') audioCtx.resume(); }
    function updateUI(){ depthSpan.textContent = String(Math.min(999,Math.floor(depth))).padStart(3,'0'); livesSpan.textContent = lives; }
    function respawnPlayer(){
      player.x = Math.min(W - player.width - 10, Math.max(10, W/2 - player.width/2));
      player.y = 30; player.vx = 0; player.vy = 0;
      invulnerable = true; invulnerableTimer = 80;
    }
    function resetGame(){
      gameActive = true; paused = false; document.getElementById('pauseButton').textContent = '⏸️ 暂停';
      lives = 3; depth = 0; lastDepth = 0; updateUI(); lastScoreSubmitted = false;
      player.width = BASE_PLAYER_W; player.height = BASE_PLAYER_H;
      player.x = W/2 - player.width/2; player.y = 340; player.vx = 0; player.vy = 0; player.isGrounded = false;
      invulnerable = false; invulnerableTimer = 0; playerScale=1; landSquash=0;
      platforms = []; powerups = [];
      const baseY = H-70;
      platforms.push({ x:W/2-80, y:baseY, w:130, h:PLATFORM_H, counted:false, dessertType:0 });
      platforms.push({ x:130, y:baseY-80, w:100, h:PLATFORM_H, counted:false, dessertType:1 });
      platforms.push({ x:430, y:baseY-150, w:110, h:PLATFORM_H, counted:false, dessertType:2 });
      for(let i=0;i<4;i++) {
        let x, y, w, overlapping;
        do {
          overlapping = false;
          x = 30 + Math.random()*(W-150);
          y = 150 + Math.random()*250;
          w = 70 + Math.floor(Math.random()*55);
          for(let p of platforms) if(Math.abs(p.y - y) < 50 && Math.abs((p.x+p.w/2) - (x+w/2)) < 80) { overlapping = true; break; }
        } while(overlapping);
        platforms.push({ x, y, w, h:PLATFORM_H, counted:false, dessertType: Math.floor(Math.random()*5) });
      }
      generateCooldown=10; left=right=up=space=false; playSound('click');
    }
    
    function isOverlappingWithPlatforms(newX, newY, newW) {
      for(let p of platforms) if(Math.abs(p.y - newY) < 60 && newX < p.x+p.w && newX+newW > p.x) return true;
      return false;
    }
    
    function spawnPlatform(){
      if(!gameActive||paused||platforms.length>=MAX_PLATFORMS) return;
      let x, y, w, overlapping, attempts = 0;
      do {
        overlapping = false;
        w = MIN_PLAT_W + Math.floor(Math.random()*(MAX_PLAT_W-MIN_PLAT_W));
        x = 10 + Math.random()*(W - w - 20);
        y = H + 10 + Math.random()*30;
        overlapping = isOverlappingWithPlatforms(x, y, w);
        attempts++;
      } while(overlapping && attempts < 20);
      platforms.push({ x, y, w, h:PLATFORM_H, counted:false, dessertType: Math.floor(Math.random()*5) });
    }
    
    function spawnHeart(){
      if(!gameActive||paused||powerups.length >= 6) return;
      let x, y, overlapping, attempts = 0;
      const hw = 24, hh = 24;
      do {
        overlapping = false;
        x = 20 + Math.random()*(W - hw - 40);
        y = H + 20 + Math.random()*30;
        for(let p of platforms) if(Math.abs(p.y - y) < 50 && x < p.x+p.w && x+hw > p.x) { overlapping = true; break; }
        for(let pw of powerups) if(Math.abs(pw.y - y) < 40 && Math.abs(pw.x - x) < 40) { overlapping = true; break; }
        attempts++;
      } while(overlapping && attempts < 15);
      if(!overlapping) powerups.push({ x, y, w: hw, h: hh });
    }
    
    function fixedUpdate() {
      if(!gameActive||paused) return;
      if(invulnerable){ invulnerableTimer--; if(invulnerableTimer<=0) invulnerable=false; }
      
      // 空中摩擦力保持不变，但水平移动加速度依然有效
      if(left) player.vx -= ACCEL;
      if(right) player.vx += ACCEL;
      player.vx *= (player.isGrounded ? FRICTION_GROUND : FRICTION_AIR);
      if(Math.abs(player.vx)<0.15) player.vx=0;
      player.vx = Math.min(MAX_SPEED_X, Math.max(-MAX_SPEED_X, player.vx));
      
      player.vy += GRAVITY; if(player.vy>13) player.vy=13;
      if((up||space) && player.isGrounded && !player.jumpPressed) {
        player.vy = -JUMP_STRENGTH;
        player.isGrounded = false;
        player.jumpPressed = true;
        playerScale = 1.25;
        playSound('jump');
      }
      if(!up && !space) player.jumpPressed = false;
      
      // 水平移动并限制边界
      player.x += player.vx;
      player.x = Math.max(0, Math.min(W - player.width, player.x));
      
      // 垂直移动
      player.y += player.vy;
      
      // 平台碰撞处理（改进：空中不进行横向推出，避免吸墙）
      let grounded = false;
      for(let iter=0; iter<6; iter++) {
        for(let pl of platforms) {
          if(player.x < pl.x+pl.w && player.x+player.width > pl.x && player.y < pl.y+pl.h && player.y+player.height > pl.y) {
            const ovT = (player.y+player.height)-pl.y;
            const ovB = (pl.y+pl.h)-player.y;
            const ovL = (player.x+player.width)-pl.x;
            const ovR = (pl.x+pl.w)-player.x;
            
            // 优先处理垂直碰撞
            if(ovT > 0 && ovT < ovL && ovT < ovR && player.vy >= 0) {
              player.y = pl.y - player.height;
              player.vy = 0;
              grounded = true;
            } else if(ovB > 0 && ovB < ovL && ovB < ovR && player.vy < 0) {
              player.y = pl.y + pl.h;
              player.vy = 0.1;
            } else {
              // 水平碰撞：仅当角色在空中且未站在任何平台上时，才进行修正（避免空中吸墙）
              // 但为了防止卡墙，仍进行简单处理
              if (player.isGrounded) {
                if(ovL < ovR) {
                  player.x = pl.x - player.width;
                  player.vx = 0;
                } else {
                  player.x = pl.x + pl.w;
                  player.vx = 0;
                }
              } else {
                // 空中轻微推开，但不完全阻止移动
                if(ovL < ovR) {
                  player.x = pl.x - player.width - 0.1;
                } else {
                  player.x = pl.x + pl.w + 0.1;
                }
              }
            }
          }
        }
      }
      
      const wasGrounded = player.isGrounded;
      player.isGrounded = grounded;
      if(!wasGrounded && grounded) { landSquash=8; playerScale=0.85; playSound('land'); }
      
      // 平台上升
      for(let pl of platforms) pl.y -= PLATFORM_SPEED;
      for(let pw of powerups) pw.y -= PLATFORM_SPEED;
      
      platforms = platforms.filter(pl => {
        if(pl.y+pl.h < 0) { if(!pl.counted) { pl.counted=true; depth++; if(depth>lastDepth){ scorePop=12; playSound('score'); } lastDepth=depth; updateUI(); } return false; }
        return true;
      });
      
      powerups = powerups.filter(pw => {
        if(pw.y + pw.h < 0) return false;
        if(player.x < pw.x+pw.w && player.x+player.width > pw.x && player.y < pw.y+pw.h && player.y+player.height > pw.y) {
          if(lives < MAX_LIVES) { lives++; updateUI(); playSound('heart'); }
          return false;
        }
        return true;
      });
      
      if(gameActive && !paused) {
        let baseCooldown = Math.max(16, 34 - Math.floor(depth/18));
        baseCooldown = Math.max(12, baseCooldown / platformSpawnRate);
        if(generateCooldown<=0) { spawnPlatform(); generateCooldown = Math.floor(baseCooldown); }
        else generateCooldown--;
        if(Math.random() < 0.008 * heartSpawnProb) spawnHeart();
      }
      
      if(gameActive && !invulnerable && (player.y+player.height >= H || player.y <= 0)) {
        lives--; updateUI(); playSound('gameover');
        if(lives <= 0) { 
          gameActive = false; 
          if(!lastScoreSubmitted) {
            pendingScore = depth;
            document.getElementById('submitScoreArea').style.display = 'block';
            document.getElementById('rankModal').classList.add('show');
            lastScoreSubmitted = true;
          }
        } else { respawnPlayer(); }
      }
      
      playerScale = playerScale*0.9 + 1.0*0.1; landSquash *= 0.7; scorePop = Math.max(0, scorePop-1);
    }
    
    function getCurrentSkin() {
      if(!gameActive && skinGameover) return skinGameover;
      if(lives === 3) return skin3; if(lives === 2) return skin2; if(lives === 1) return skin1;
      return null;
    }
    
    function drawDessertPlatform(pl) {
      const type = pl.dessertType || 0;
      let base, light, dark;
      if (type === 0) { base = '#d99fb0'; light = '#f2c4d0'; dark = '#b2667a'; }
      else if (type === 1) { base = '#f7c0c6'; light = '#ffe0e5'; dark = '#e08b9c'; }
      else if (type === 2) { base = '#e3a0b5'; light = '#f5c6d6'; dark = '#c46b84'; }
      else if (type === 3) { base = '#dbb2c4'; light = '#edd4e2'; dark = '#b47b94'; }
      else { base = '#f2d0d6'; light = '#ffe9ee'; dark = '#d49aaa'; }
      const grad = ctx.createLinearGradient(pl.x, pl.y, pl.x+pl.w, pl.y+pl.h);
      grad.addColorStop(0, light); grad.addColorStop(0.5, base); grad.addColorStop(1, dark);
      ctx.fillStyle = grad; ctx.shadowBlur = 14; ctx.shadowColor = '#ffb0c0';
      ctx.beginPath(); ctx.roundRect(pl.x, pl.y, pl.w, pl.h, 8); ctx.fill();
      ctx.shadowBlur = 4; ctx.lineWidth = 1.5; ctx.strokeStyle = '#ffffff30';
      for(let i = -pl.h; i < pl.w + pl.h; i += 12) {
        ctx.beginPath(); ctx.moveTo(pl.x + i, pl.y); ctx.lineTo(pl.x + i - pl.h, pl.y + pl.h); ctx.stroke();
      }
      for(let i = 0; i < pl.w + pl.h; i += 12) {
        ctx.beginPath(); ctx.moveTo(pl.x + i, pl.y); ctx.lineTo(pl.x + i + pl.h, pl.y + pl.h); ctx.stroke();
      }
      ctx.shadowBlur = 8; ctx.fillStyle = '#ffffff90';
      ctx.beginPath(); ctx.roundRect(pl.x + 3, pl.y - 2, pl.w - 6, 6, 4); ctx.fill();
      ctx.shadowBlur = 0; ctx.strokeStyle = '#fbe4ec'; ctx.lineWidth = 2.5; ctx.stroke();
    }
    
    function drawPlayer(){
      const skin = getCurrentSkin();
      const cx = player.x + player.width/2, cy = player.y + player.height/2;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.scale(playerScale, playerScale * (1 - landSquash*0.02));
      ctx.translate(-cx, -cy);
      
      if(skin && skin.complete) {
        ctx.shadowBlur = 20; ctx.shadowColor = '#f0b87b';
        ctx.drawImage(skin, player.x, player.y, player.width, player.height);
      } else {
        const w = player.width, h = player.height;
        const px = player.x, py = player.y;
        ctx.shadowBlur = 22; ctx.shadowColor = '#f0b87b';
        const grad = ctx.createRadialGradient(px + w*0.2, py + h*0.2, 2, cx, cy, w*0.6);
        grad.addColorStop(0, '#f5d742'); grad.addColorStop(1, '#d68b2c');
        ctx.fillStyle = grad; ctx.fillRect(px, py, w, h);
        ctx.fillStyle = '#191e2b';
        const eyeSize = w * 0.18;
        const leftEyeX = px + w * 0.3, rightEyeX = px + w * 0.7, eyeY = py + h * 0.35;
        ctx.beginPath(); ctx.arc(leftEyeX, eyeY, eyeSize, 0, 2*Math.PI); ctx.fill();
        ctx.beginPath(); ctx.arc(rightEyeX, eyeY, eyeSize, 0, 2*Math.PI); ctx.fill();
        ctx.fillStyle = '#f5f9ff';
        const highlightSize = w * 0.09;
        ctx.beginPath(); ctx.arc(leftEyeX - w*0.03, eyeY - h*0.03, highlightSize, 0, 2*Math.PI); ctx.fill();
        ctx.beginPath(); ctx.arc(rightEyeX - w*0.03, eyeY - h*0.03, highlightSize, 0, 2*Math.PI); ctx.fill();
        ctx.fillStyle = '#bd3b1b'; ctx.shadowBlur = 12;
        ctx.fillRect(px - w*0.05, py - h*0.15, w*1.1, h*0.2);
        ctx.fillRect(px + w*0.25, py - h*0.35, w*0.2, h*0.25);
      }
      ctx.restore();
    }
    
    function draw(){
      let grad = ctx.createLinearGradient(0,0,0,H);
      if(currentTheme===0){ grad.addColorStop(0,'#2a1a28'); grad.addColorStop(0.7,'#4a2e45'); }
      else if(currentTheme===1){ grad.addColorStop(0,'#1a3a32'); grad.addColorStop(0.7,'#2a5a48'); }
      else { grad.addColorStop(0,'#3d1e22'); grad.addColorStop(0.6,'#752e38'); }
      ctx.fillStyle = grad; ctx.fillRect(0,0,W,H);
      for(let pl of platforms) drawDessertPlatform(pl);
      for(let pw of powerups) {
        ctx.save(); ctx.translate(pw.x+pw.w/2, pw.y+pw.h/2); ctx.scale(0.8,0.8);
        ctx.fillStyle = '#ff4d6d'; ctx.shadowBlur=20; ctx.shadowColor='#ffb0b0';
        ctx.beginPath(); ctx.moveTo(0, -pw.h/2.5);
        ctx.bezierCurveTo(-pw.w/2, -pw.h/1.5, -pw.w, pw.h/5, 0, pw.h/1.8);
        ctx.bezierCurveTo(pw.w, pw.h/5, pw.w/2, -pw.h/1.5, 0, -pw.h/2.5);
        ctx.fill(); ctx.restore();
      }
      if(invulnerable && (Math.floor(Date.now()/100)%2)) {} else drawPlayer();
      ctx.font='bold 32px Poppins'; ctx.fillStyle='#fce5f0'; ctx.fillText(`🍰 ${Math.floor(depth)}`,20,70);
      if(!gameActive) {
        ctx.fillStyle = '#1a0f16cc'; ctx.fillRect(0,0,W,H);
        if(skinGameover?.complete) { let imgSize = 300; ctx.drawImage(skinGameover, W/2 - imgSize/2, H/2 - imgSize/2, imgSize, imgSize); }
        else { ctx.font='bold 48px Segoe UI'; ctx.fillStyle='#ffc0d0'; ctx.textAlign='center'; ctx.fillText('💔 游戏结束',W/2,H/2); }
      } else if(paused) {
        ctx.fillStyle = '#2a1a28cc'; ctx.fillRect(0,0,W,H);
        ctx.font='bold 48px Segoe UI'; ctx.fillStyle='#ffe0f0'; ctx.textAlign='center'; ctx.fillText('⏸ 暂停',W/2,H/2);
      }
      ctx.textAlign='left';
    }
    
    function gameLoop(now) {
      requestAnimationFrame(gameLoop);
      if (!lastTimestamp) { lastTimestamp = now; return; }
      let deltaTime = now - lastTimestamp; lastTimestamp = now;
      if (deltaTime > 100) deltaTime = 100;
      accumulator += deltaTime;
      while (accumulator >= FIXED_TIMESTEP) { fixedUpdate(); accumulator -= FIXED_TIMESTEP; }
      draw();
    }
    
    // 排行榜功能
    async function fetchRankings() {
      const listEl = document.getElementById('rankList');
      listEl.innerHTML = '<li style="text-align:center;">加载中...</li>';
      try {
        if (useFirebase && db) {
          const snapshot = await db.collection('rankings').orderBy('score', 'desc').limit(10).get();
          listEl.innerHTML = '';
          if (snapshot.empty) { listEl.innerHTML = '<li>暂无记录</li>'; return; }
          snapshot.forEach(doc => {
            const data = doc.data();
            const li = document.createElement('li'); li.className = 'rank-item';
            li.innerHTML = `<span class="rank-name">${data.name||'匿名'}</span><span class="rank-score">${data.score}</span>`;
            listEl.appendChild(li);
          });
        } else {
          // 本地模拟
          localRankings.sort((a,b)=>b.score-a.score);
          listEl.innerHTML = '';
          if (localRankings.length === 0) { listEl.innerHTML = '<li>暂无记录</li>'; return; }
          localRankings.slice(0,10).forEach(r => {
            const li = document.createElement('li'); li.className = 'rank-item';
            li.innerHTML = `<span class="rank-name">${r.name}</span><span class="rank-score">${r.score}</span>`;
            listEl.appendChild(li);
          });
        }
      } catch(e) { listEl.innerHTML = '<li>加载失败</li>'; }
    }
    
    async function submitScore(name, score) {
      if(!name) name = '玩家';
      name = name.substring(0,12);
      try {
        if (useFirebase && db) {
          await db.collection('rankings').add({ name, score, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
        } else {
          localRankings.push({ name, score });
          saveLocalRankings();
        }
        fetchRankings();
        document.getElementById('submitScoreArea').style.display = 'none';
        alert('分数已提交！');
      } catch(e) { alert('提交失败'); }
    }
    
    // 事件绑定
    function handleKeyDown(e){
      enableAudio();
      if(e.code === pauseKeyCode) { e.preventDefault(); if(gameActive){ paused=!paused; document.getElementById('pauseButton').textContent = paused?'▶️ 继续':'⏸️ 暂停'; } return; }
      if(!gameActive) { if(e.code==='KeyR') resetGame(); return; }
      if(paused) return;
      if(e.code===keyMap.left) { left=true; e.preventDefault(); }
      if(e.code===keyMap.right) { right=true; e.preventDefault(); }
      if(e.code===keyMap.jump1) { up=true; e.preventDefault(); }
      if(e.code===keyMap.jump2) { space=true; e.preventDefault(); }
      if(e.code==='KeyR') resetGame();
    }
    function handleKeyUp(e){
      if(e.code===keyMap.left) { left=false; e.preventDefault(); }
      if(e.code===keyMap.right) { right=false; e.preventDefault(); }
      if(e.code===keyMap.jump1) { up=false; e.preventDefault(); }
      if(e.code===keyMap.jump2) { space=false; e.preventDefault(); }
    }
    window.addEventListener('keydown', handleKeyDown); window.addEventListener('keyup', handleKeyUp);
    
    // 移动端触控：使用 pointerdown/pointerup 并设置 touch-action
    const touchLeft = document.getElementById('touchLeft');
    const touchRight = document.getElementById('touchRight');
    const touchJump = document.getElementById('touchJump');
    
    function setupTouchButton(el, setter) {
      el.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        el.setPointerCapture(e.pointerId);
        setter(true);
      });
      el.addEventListener('pointerup', (e) => {
        e.preventDefault();
        el.releasePointerCapture(e.pointerId);
        setter(false);
      });
      el.addEventListener('pointercancel', (e) => {
        e.preventDefault();
        setter(false);
      });
    }
    setupTouchButton(touchLeft, (v) => left = v);
    setupTouchButton(touchRight, (v) => right = v);
    setupTouchButton(touchJump, (v) => { up = v; space = v; });
    
    document.getElementById('restartButton').onclick=()=>{ enableAudio(); resetGame(); };
    document.getElementById('pauseButton').onclick=()=>{ if(gameActive){ paused=!paused; document.getElementById('pauseButton').textContent = paused?'▶️ 继续':'⏸️ 暂停'; } };
    
    const modal = document.getElementById('rankModal');
    document.getElementById('rankBtn').onclick = ()=>{
      modal.classList.add('show');
      fetchRankings();
      document.getElementById('submitScoreArea').style.display = gameActive ? 'none' : (lastScoreSubmitted ? 'none' : 'block');
    };
    document.getElementById('closeRankModal').onclick = ()=> modal.classList.remove('show');
    document.getElementById('submitScoreBtn').onclick = ()=>{
      const name = document.getElementById('nicknameInput').value;
      submitScore(name, pendingScore);
    };
    
    const drawer=document.getElementById('settingsDrawer'), overlay=document.getElementById('overlay');
    document.getElementById('settingsToggle').onclick=()=>{ drawer.classList.add('open'); overlay.classList.add('show'); };
    document.getElementById('closeDrawer').onclick=()=>{ drawer.classList.remove('open'); overlay.classList.remove('show'); };
    overlay.onclick=()=>{ drawer.classList.remove('open'); overlay.classList.remove('show'); };
    document.getElementById('keyPresetSelect').onchange=e=>{ Object.assign(keyMap, presets[e.target.value]); };
    document.getElementById('pauseKeySelect').onchange=e=>{ pauseKeyCode = e.target.value; };
    document.getElementById('sizeSlider').oninput=e=>{ 
      BASE_PLAYER_W = BASE_PLAYER_H = parseInt(e.target.value); 
      player.width = BASE_PLAYER_W; player.height = BASE_PLAYER_H;
      document.getElementById('sizeValue').textContent = e.target.value;
    };
    document.getElementById('jumpSlider').oninput=e=>{ 
      JUMP_STRENGTH = parseFloat(e.target.value); 
      document.getElementById('jumpValue').textContent = JUMP_STRENGTH.toFixed(1);
    };
    document.getElementById('frictionSlider').oninput=e=>{ FRICTION_GROUND = parseFloat(e.target.value); document.getElementById('frictionValue').textContent = FRICTION_GROUND.toFixed(2); };
    document.getElementById('platformRateSlider').oninput=e=>{ platformSpawnRate=parseFloat(e.target.value); document.getElementById('platformRateVal').textContent=platformSpawnRate.toFixed(1); };
    document.getElementById('heartRateSlider').oninput=e=>{ heartSpawnProb=parseFloat(e.target.value); document.getElementById('heartRateVal').textContent=heartSpawnProb.toFixed(1); };
    document.getElementById('themeSelect').onchange=e=>{ currentTheme = {default:0, forest:1, lava:2}[e.target.value]; };
    document.getElementById('soundToggle').onchange=e=>{ soundEnabled = e.target.checked; };
    const skinUpload = document.getElementById('skinUpload');
    let pendingSkinType = '';
    function handleSkinUpload(file, type) {
      if(!file) return; const reader = new FileReader();
      reader.onload = ev => { const img = new Image(); img.src = ev.target.result;
        img.onload = () => { if(type==='skin3') skin3 = img; else if(type==='skin2') skin2 = img; else if(type==='skin1') skin1 = img; else if(type==='gameover') skinGameover = img; };
      }; reader.readAsDataURL(file);
    }
    document.getElementById('skin3Btn').onclick = ()=>{ pendingSkinType='skin3'; skinUpload.click(); };
    document.getElementById('skin2Btn').onclick = ()=>{ pendingSkinType='skin2'; skinUpload.click(); };
    document.getElementById('skin1Btn').onclick = ()=>{ pendingSkinType='skin1'; skinUpload.click(); };
    document.getElementById('gameoverSkinBtn').onclick = ()=>{ pendingSkinType='gameover'; skinUpload.click(); };
    skinUpload.onchange = (e) => { if(e.target.files.length) { handleSkinUpload(e.target.files[0], pendingSkinType); skinUpload.value=''; } };
    document.getElementById('resetAllSkins').onclick = ()=>{ skin3=skin2=skin1=skinGameover=null; };
    
    canvas.addEventListener('touchstart', e=>e.preventDefault());
    canvas.addEventListener('click', ()=>{ enableAudio(); canvas.focus(); });
    resetGame(); requestAnimationFrame(gameLoop);
    document.body.addEventListener('click', enableAudio, {once:true});
  })();
</script>
</body>
